    function QuizScreen({ level, onFinish, onBack }) {
      const [questions] = useState(() => {
        const total = level.questions.length;
        const draw = total <= 8 ? 6 : total <= 12 ? 8 : 10;
        return shuffle(level.questions).slice(0, draw).map(shuffleQ);
      });
      const [cur, setCur] = useState(0);
      const [answers, setAnswers] = useState({});
      const [fill, setFill] = useState("");
      const [submitted, setSubmitted] = useState(false);
      const [combo, setCombo] = useState(0);

      const q = questions[cur];
      const total = questions.length;

      const pickSingle = (i) => { if (!submitted) setAnswers(p => ({ ...p, [cur]: i })); };
      const pickMulti = (i) => {
        if (submitted) return;
        setAnswers(p => {
          const cur2 = Array.isArray(p[cur]) ? p[cur] : [];
          return { ...p, [cur]: cur2.includes(i) ? cur2.filter(x=>x!==i) : [...cur2,i].sort((a,b)=>a-b) };
        });
      };
      const pickBool = (v) => { if (!submitted) setAnswers(p => ({ ...p, [cur]: v })); };

      const canGo = () => {
        if (submitted) return true;
        if (q.type === "fill") return fill.trim().length > 0;
        if (q.type === "multiple") return Array.isArray(answers[cur]) && answers[cur].length > 0;
        return answers[cur] !== undefined;
      };

      const checkFill = (ans, userFill) => {
        const norm = s => s.replace(/[\s　\-－_]/g,"").toLowerCase();
        const kws = norm(String(ans)).split(/[,，、\/]/).filter(k=>k.length>0);
        const u = norm(userFill);
        return kws.every(k => u.includes(k));
      };

      const isCorrect = (qi, i) => {
        const qq = questions[qi];
        const a = qi === cur && qq.type === "fill" ? fill : answers[qi];
        if (qq.type === "single") return a === qq.answer;
        if (qq.type === "multiple") return JSON.stringify(a||[]) === JSON.stringify(qq.answer||[]);
        if (qq.type === "boolean") return a === qq.answer;
        if (qq.type === "fill") return checkFill(qq.answer, a||"");
        return false;
      };

      const next = () => {
        if (!submitted) {
          if (q.type === "fill") setAnswers(p => ({ ...p, [cur]: fill }));
          setSubmitted(true);
          if (isCorrect(cur, cur)) setCombo(c => c+1); else setCombo(0);
          return;
        }
        if (cur < total-1) {
          setCur(c => c+1);
          setFill("");
          setSubmitted(false);
        } else {
          let correct = 0;
          const details = questions.map((qq, i) => {
            const ok = isCorrect(i, i);
            if (ok) correct++;
            return { q: qq, userAnswer: qq.type==="fill" ? (answers[i]||fill) : answers[i], correct: ok };
          });
          const score = Math.round((correct / total) * 100);
          onFinish(score, details);
        }
      };

      const selAns = answers[cur];
      const showResult = submitted;

      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background:"rgba(0,0,0,0.35)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"14px 20px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"10px" }}>
              <button onClick={onBack} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, borderRadius:"10px", width:"34px", height:"34px", cursor:"pointer", fontSize:"14px" }}>←</button>
              <div style={{ flex:1, fontSize:"13px", fontWeight:"600" }}>{level.emoji} {level.title}</div>
              <div style={{ background:"rgba(76,175,80,0.15)", border:"1px solid rgba(76,175,80,0.3)", borderRadius:"20px", padding:"5px 14px", fontSize:"13px", fontWeight:"700", color:C.greenLight }}>
                第 {cur+1} 題 / 共 {total} 題
              </div>
            </div>
            <div style={{ height:"4px", background:"rgba(255,255,255,0.06)", borderRadius:"2px" }}>
              <div style={{ height:"100%", width:((cur/total)*100 + "%"), background:"linear-gradient(90deg,#43a047,#66bb6a)", transition:"width 0.4s ease", borderRadius:"2px" }} />
            </div>
          </div>

          <div style={{ padding:"28px 20px", maxWidth:"680px", margin:"0 auto" }}>
            {combo >= 3 && submitted && isCorrect(cur,cur) && (
              <div style={{ background:"rgba(255,215,0,0.1)", border:"1px solid rgba(255,215,0,0.3)", borderRadius:"10px", padding:"8px 16px", marginBottom:"16px", fontSize:"13px", color:"#ffd700", textAlign:"center" }}>
                🔥 連對 {combo} 題！太棒了！
              </div>
            )}

            <div style={{ fontSize:"11px", color:C.textMuted, marginBottom:"12px", padding:"6px 12px", background:"rgba(255,255,255,0.03)", borderRadius:"8px", display:"inline-block" }}>
              {q.type === "single" ? "單選題" : q.type === "multiple" ? "多選題" : q.type === "boolean" ? "是非題" : "填空題"}
            </div>

            <h2 style={{ fontSize:"17px", fontWeight:"700", lineHeight:"1.7", marginBottom:"24px" }}>{q.question}</h2>

            {(q.type === "single" || q.type === "boolean") && (q.type === "boolean" ? [["true","正確 ✓"],["false","錯誤 ✗"]] : q.options.map((o,i) => [String(i),o])).map(([val, label]) => {
              const idx2 = q.type === "boolean" ? (val === "true" ? true : false) : Number(val);
              const isSel = q.type === "boolean" ? selAns === idx2 : selAns === idx2;
              const isCorrectAns = q.type === "boolean" ? idx2 === q.answer : idx2 === q.answer;
              let bg = C.bgCard, border = "1px solid rgba(255,255,255,0.1)", color = C.text;
              if (showResult) {
                if (isCorrectAns) { bg="rgba(76,175,80,0.15)"; border="1px solid rgba(76,175,80,0.5)"; color=C.greenLight; }
                else if (isSel) { bg="rgba(239,83,80,0.1)"; border="1px solid rgba(239,83,80,0.4)"; color="#ef9a9a"; }
              } else if (isSel) { bg="rgba(76,175,80,0.1)"; border="1px solid rgba(76,175,80,0.4)"; }
              return (
                <div key={val} onClick={() => q.type==="boolean" ? pickBool(idx2) : pickSingle(idx2)} style={{ background:bg, border, borderRadius:"14px", padding:"16px 18px", marginBottom:"10px", cursor:"pointer", display:"flex", alignItems:"center", gap:"14px", color }}>
                  <div style={{ width:"22px", height:"22px", borderRadius:"50%", border: isSel || (showResult&&isCorrectAns) ? "2px solid currentColor" : "2px solid rgba(255,255,255,0.2)", background: showResult&&isCorrectAns ? "#4caf50" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", flexShrink:0, color: showResult&&isCorrectAns ? "#fff" : "currentColor" }}>{showResult&&isCorrectAns ? "✓" : ""}</div>
                  <span style={{ fontSize:"14px", lineHeight:"1.5" }}>{label}</span>
                </div>
              );
            })}

            {q.type === "multiple" && q.options.map((opt, i) => {
              const sel = Array.isArray(selAns) && selAns.includes(i);
              const isAns = Array.isArray(q.answer) && q.answer.includes(i);
              let bg = C.bgCard, border = "1px solid rgba(255,255,255,0.1)", color = C.text;
              if (showResult) {
                if (isAns) { bg="rgba(76,175,80,0.15)"; border="1px solid rgba(76,175,80,0.5)"; color=C.greenLight; }
                else if (sel) { bg="rgba(239,83,80,0.1)"; border="1px solid rgba(239,83,80,0.4)"; color="#ef9a9a"; }
              } else if (sel) { bg="rgba(76,175,80,0.1)"; border="1px solid rgba(76,175,80,0.4)"; }
              return (
                <div key={i} onClick={() => pickMulti(i)} style={{ background:bg, border, borderRadius:"14px", padding:"16px 18px", marginBottom:"10px", cursor:"pointer", display:"flex", alignItems:"center", gap:"14px", color }}>
                  <div style={{ width:"22px", height:"22px", borderRadius:"5px", border: sel || (showResult&&isAns) ? "2px solid currentColor" : "2px solid rgba(255,255,255,0.2)", background: showResult&&isAns ? "#4caf50" : sel&&!showResult ? "rgba(76,175,80,0.3)" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", flexShrink:0, color: showResult&&isAns ? "#fff" : "currentColor" }}>{showResult&&isAns ? "✓" : sel&&!showResult ? "✓" : ""}</div>
                  <span style={{ fontSize:"14px", lineHeight:"1.5" }}>{opt}</span>
                </div>
              );
            })}

            {q.type === "fill" && (
              <div>
                <input value={fill} onChange={e=>setFill(e.target.value)} onKeyDown={e=>e.key==="Enter"&&canGo()&&next()} disabled={showResult} placeholder="輸入答案…" style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:"12px", padding:"14px 16px", color:C.text, fontSize:"15px", outline:"none" }} />
                {showResult && (
                  <div style={{ marginTop:"10px", fontSize:"13px", color: isCorrect(cur,cur) ? C.greenLight : "#ef9a9a" }}>
                    {isCorrect(cur,cur) ? "✓ 正確！" : "參考答案：" + q.answer}
                  </div>
                )}
              </div>
            )}

            {showResult && q.explanation && (
              <div style={{ background:"rgba(76,175,80,0.07)", border:"1px solid rgba(76,175,80,0.2)", borderRadius:"12px", padding:"14px 16px", marginTop:"16px" }}>
                <div style={{ fontSize:"11px", color:C.green, marginBottom:"6px", fontWeight:"700" }}>💡 解析</div>
                <div style={{ fontSize:"13px", color:"rgba(240,244,240,0.75)", lineHeight:"1.7" }}>{q.explanation}</div>
              </div>
            )}

            <button onClick={next} disabled={!canGo()} style={{ width:"100%", marginTop:"24px", padding:"14px", background: canGo() ? "linear-gradient(135deg,#43a047,#66bb6a)" : "rgba(255,255,255,0.05)", border:"none", borderRadius:"14px", color: canGo() ? "#fff" : C.textDim, fontSize:"14px", fontWeight:"700", cursor: canGo() ? "pointer" : "not-allowed" }}>
              {!submitted ? "確認答案" : cur < total-1 ? "下一題 →" : "查看結果 →"}
            </button>
          </div>
        </div>
      );
    }

    function ResultScreen({ score, details, levelTitle, onRetake, onMap }) {
      const passed = score >= 90;
      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background: passed ? "linear-gradient(135deg,rgba(76,175,80,0.2),rgba(56,142,60,0.1))" : "rgba(255,152,0,0.08)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"48px 24px", textAlign:"center" }}>
            <div style={{ fontSize:"52px", marginBottom:"12px" }}>{passed ? "🎉" : "💪"}</div>
            <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:"32px", color: passed ? C.greenLight : "#ffb74d", marginBottom:"8px" }}>{score} 分</div>
            <div style={{ fontSize:"15px", color:C.textMuted, marginBottom:"20px" }}>{passed ? "通過！" : "未通過，需要 90 分"}</div>
            <div style={{ display:"flex", gap:"12px", justifyContent:"center" }}>
              <button onClick={onRetake} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, padding:"11px 22px", borderRadius:"12px", fontSize:"13px", cursor:"pointer" }}>再試一次</button>
              <button onClick={onMap} style={{ background:"linear-gradient(135deg,#43a047,#66bb6a)", border:"none", color:"#fff", padding:"11px 22px", borderRadius:"12px", fontSize:"13px", fontWeight:"700", cursor:"pointer" }}>回關卡地圖</button>
            </div>
          </div>
          <div style={{ padding:"24px 20px", maxWidth:"680px", margin:"0 auto" }}>
            <div style={{ fontSize:"12px", color:C.textMuted, letterSpacing:"2px", marginBottom:"16px" }}>答題回顧</div>
            {details.map((d, i) => (
              <div key={i} style={{ background: d.correct ? "rgba(76,175,80,0.07)" : "rgba(239,83,80,0.07)", border: "1px solid " + (d.correct ? "rgba(76,175,80,0.2)" : "rgba(239,83,80,0.2)"), borderRadius:"14px", padding:"16px", marginBottom:"10px" }}>
                <div style={{ fontSize:"11px", color: d.correct ? C.green : "#ef9a9a", fontWeight:"700", marginBottom:"8px" }}>{d.correct ? "✓ 答對" : "✗ 答錯"} · 第 {i+1} 題</div>
                <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"10px" }}>{d.q.question}</div>
                {!d.correct && d.q.type !== "fill" && (
                  <div style={{ fontSize:"12px", color:C.textMuted, marginBottom:"6px" }}>
                    正確答案：<span style={{ color:C.greenLight }}>
                      {d.q.type==="single" ? d.q.options[d.q.answer]
                        : d.q.type==="multiple" ? d.q.answer.map(a=>d.q.options[a]).join("、")
                        : d.q.answer ? "正確" : "錯誤"}
                    </span>
                  </div>
                )}
                {d.q.explanation && <div style={{ fontSize:"12px", color:C.textDim, lineHeight:"1.6" }}>{d.q.explanation}</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScenarioScreen({ level, onBack }) {
      const [cur, setCur] = useState(0);
      const [sel, setSel] = useState(null);
      const [revealed, setReveal] = useState(false);
      const [done, setDone] = useState(false);
      const [results, setResults] = useState([]);
      const qs = level.questions;
      const q = qs[cur];

      const next = () => {
        const res = [...results, { q, sel, ideal: sel === q.bestAnswer }];
        if (cur < qs.length - 1) {
          setResults(res); setCur(c=>c+1); setSel(null); setReveal(false);
        } else {
          setResults(res); setDone(true);
        }
      };

      if (done) return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background:"linear-gradient(135deg,rgba(76,175,80,0.15),rgba(56,142,60,0.08))", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"48px 24px", textAlign:"center" }}>
            <div style={{ fontSize:"48px", marginBottom:"12px" }}>🧠</div>
            <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:"26px", color:C.greenLight, marginBottom:"8px" }}>情境挑戰完成！</div>
            <div style={{ fontSize:"13px", color:C.textMuted, marginBottom:"20px" }}>{results.filter(r=>r.ideal).length} / {qs.length} 題選擇了最佳處理方式</div>
            <button onClick={onBack} style={{ background:"linear-gradient(135deg,#43a047,#66bb6a)", border:"none", color:"#fff", padding:"12px 28px", borderRadius:"12px", fontSize:"14px", fontWeight:"700", cursor:"pointer" }}>← 回關卡地圖</button>
          </div>
          <div style={{ padding:"24px 20px", maxWidth:"720px", margin:"0 auto" }}>
            {results.map((r, i) => (
              <div key={i} style={{ background: r.ideal ? "rgba(76,175,80,0.07)" : "rgba(255,183,77,0.07)", border:"1px solid " + (r.ideal ? "rgba(76,175,80,0.2)" : "rgba(255,183,77,0.2)"), borderRadius:"16px", padding:"20px", marginBottom:"12px" }}>
                <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"12px" }}>{r.q.question}</div>
                <div style={{ background:"rgba(76,175,80,0.08)", border:"1px solid rgba(76,175,80,0.2)", borderRadius:"10px", padding:"10px 14px", marginBottom:"8px", fontSize:"13px", color:C.greenLight }}>最佳：{r.q.options[r.q.bestAnswer]}</div>
                {r.sel !== r.q.bestAnswer && <div style={{ background:"rgba(255,183,77,0.08)", border:"1px solid rgba(255,183,77,0.2)", borderRadius:"10px", padding:"10px 14px", marginBottom:"8px", fontSize:"13px", color:"#ffcc80" }}>你選：{r.q.options[r.sel]}</div>}
                <div style={{ fontSize:"13px", color:C.textMuted, lineHeight:"1.8", borderTop:"1px solid rgba(255,255,255,0.08)", paddingTop:"12px" }}>
                  {r.q.thinking.split("\n").map((line, j) => (
                    <div key={j} style={{ fontWeight: line.startsWith("關鍵思維") ? "700" : "400", color: line.startsWith("關鍵思維") ? C.greenLight : C.textMuted, marginTop: line.startsWith("關鍵思維") ? "8px" : "0" }}>{line || "\u00a0"}</div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background:"rgba(0,0,0,0.35)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"14px 20px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"10px" }}>
              <button onClick={onBack} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, borderRadius:"10px", width:"34px", height:"34px", cursor:"pointer", fontSize:"14px" }}>←</button>
              <div style={{ flex:1, fontSize:"13px", fontWeight:"600" }}>🧠 情境挑戰・不計分</div>
              <div style={{ background:"rgba(255,183,77,0.15)", border:"1px solid rgba(255,183,77,0.3)", borderRadius:"20px", padding:"5px 14px", fontSize:"13px", fontWeight:"700", color:"#ffcc80" }}>第 {cur+1} / {qs.length} 題</div>
            </div>
            <div style={{ height:"4px", background:"rgba(255,255,255,0.06)", borderRadius:"2px" }}>
              <div style={{ height:"100%", width:((cur/qs.length)*100 + "%"), background:"linear-gradient(90deg,#f9a825,#ffd54f)", transition:"width 0.4s ease", borderRadius:"2px" }} />
            </div>
          </div>
          <div style={{ padding:"28px 20px", maxWidth:"680px", margin:"0 auto" }}>
            <div style={{ background:"rgba(255,183,77,0.06)", border:"1px solid rgba(255,183,77,0.15)", borderRadius:"10px", padding:"8px 14px", marginBottom:"20px", display:"inline-block", fontSize:"11px", color:"#ffcc80" }}>🎭 情境題・思考你的判斷</div>
            <h2 style={{ fontSize:"17px", fontWeight:"700", lineHeight:"1.7", marginBottom:"24px" }}>{q.question}</h2>
            {q.options.map((opt, i) => {
              const isBest = i === q.bestAnswer;
              const isSel = sel === i;
              let bg = C.bgCard, border = "1px solid rgba(255,255,255,0.1)", color = C.text;
              if (revealed) {
                if (isBest) { bg="rgba(76,175,80,0.15)"; border="1px solid rgba(76,175,80,0.5)"; color=C.greenLight; }
                else if (isSel) { bg="rgba(255,183,77,0.1)"; border="1px solid rgba(255,183,77,0.4)"; color="#ffcc80"; }
              } else if (isSel) { bg="rgba(255,183,77,0.1)"; border="1px solid rgba(255,183,77,0.4)"; color="#ffcc80"; }
              return (
                <div key={i} onClick={() => !revealed && setSel(i)} style={{ background:bg, border, borderRadius:"14px", padding:"16px 18px", marginBottom:"10px", cursor:revealed?"default":"pointer", display:"flex", alignItems:"center", gap:"14px", color }}>
                  <div style={{ width:"22px", height:"22px", borderRadius:"50%", border:"2px solid currentColor", background: revealed&&isBest ? "#4caf50" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"11px", flexShrink:0, color: revealed&&isBest ? "#fff" : "currentColor" }}>{revealed&&isBest ? "✓" : ""}</div>
                  <span style={{ fontSize:"14px", lineHeight:"1.5" }}>{opt}</span>
                </div>
              );
            })}
            {revealed && (
              <div style={{ background:"rgba(76,175,80,0.06)", border:"1px solid rgba(76,175,80,0.2)", borderRadius:"14px", padding:"18px", marginTop:"8px" }}>
                <div style={{ fontSize:"11px", color:C.green, fontWeight:"700", letterSpacing:"1px", marginBottom:"10px" }}>🧠 思考框架</div>
                {q.thinking.split("\n").map((line, i) => (
                  <div key={i} style={{ fontSize:"13px", lineHeight:"1.8", color: line.startsWith("關鍵思維") ? C.greenLight : C.textMuted, fontWeight: line.startsWith("關鍵思維") ? "700" : "400", marginTop: !line.trim() ? "6px" : "0" }}>{line || "\u00a0"}</div>
                ))}
              </div>
            )}
            <div style={{ display:"flex", gap:"12px", marginTop:"24px" }}>
              {!revealed
                ? <button onClick={() => setReveal(true)} disabled={sel===null} style={{ flex:1, padding:"14px", background: sel!==null ? "rgba(255,183,77,0.2)" : "rgba(255,255,255,0.04)", border: sel!==null ? "1px solid rgba(255,183,77,0.4)" : "1px solid rgba(255,255,255,0.1)", borderRadius:"14px", color: sel!==null ? "#ffd54f" : C.textDim, fontSize:"14px", fontWeight:"700", cursor: sel!==null ? "pointer" : "not-allowed", fontFamily:"inherit" }}>💡 看思考框架</button>
                : <button onClick={next} style={{ flex:1, padding:"14px", background:"linear-gradient(135deg,#43a047,#66bb6a)", border:"none", borderRadius:"14px", color:"#fff", fontSize:"14px", fontWeight:"700", cursor:"pointer" }}>{cur < qs.length-1 ? "下一題 →" : "完成挑戰 ✓"}</button>
              }
            </div>
          </div>
        </div>
      );
    }

    function DashboardScreen({ levels, progress, displayName, onClose }) {
      const regular = levels.filter(l => l.id !== "level_19");
      const passed = regular.filter(l => progress[l.id] && progress[l.id].passed).length;
      const pct = Math.round((passed / regular.length) * 100);
      const badges = getBadges(progress);
      const attempted = regular.filter(l => progress[l.id] && progress[l.id].attempts > 0);
      const weak = attempted.filter(l => !progress[l.id].passed).sort((a,b) => (progress[a.id].bestScore||0) - (progress[b.id].bestScore||0)).slice(0,3);

      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background:"rgba(0,0,0,0.35)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"14px 20px", display:"flex", alignItems:"center", gap:"14px", position:"sticky", top:0, zIndex:10 }}>
            <button onClick={onClose} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, borderRadius:"10px", width:"36px", height:"36px", cursor:"pointer", fontSize:"16px" }}>←</button>
            <div>
              <div style={{ fontSize:"16px", fontWeight:"700" }}>📊 我的學習成績</div>
              <div style={{ fontSize:"11px", color:C.textMuted }}>{displayName}・自己跟自己比</div>
            </div>
          </div>
          <div style={{ padding:"24px 20px", maxWidth:"720px", margin:"0 auto" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"12px", marginBottom:"24px" }}>
              {[["✅","通過關卡", passed + "/18", C.green],["📈","完成率", pct + "%", C.greenLight],["🏅","獲得徽章", String(badges.length), C.gold]].map(([e,l,v,c]) => (
                <div key={l} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", borderRadius:"16px", padding:"20px 16px", textAlign:"center" }}>
                  <div style={{ fontSize:"22px", marginBottom:"4px" }}>{e}</div>
                  <div style={{ fontSize:"26px", fontWeight:"800", color:c }}>{v}</div>
                  <div style={{ fontSize:"11px", color:C.textMuted, marginTop:"4px" }}>{l}</div>
                </div>
              ))}
            </div>

            {weak.length > 0 && (
              <div style={{ background:"rgba(255,112,67,0.06)", border:"1px solid rgba(255,112,67,0.18)", borderRadius:"16px", padding:"18px", marginBottom:"24px" }}>
                <div style={{ fontSize:"12px", color:"#ff8a65", letterSpacing:"2px", marginBottom:"12px", fontWeight:"700" }}>⚠️ 建議加強</div>
                {weak.map(l => (
                  <div key={l.id} style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"8px" }}>
                    <span style={{ fontSize:"18px" }}>{l.emoji}</span>
                    <div style={{ flex:1, fontSize:"13px" }}>{l.title}</div>
                    <div style={{ fontSize:"12px", color:"#ff8a65", fontWeight:"700" }}>最高 {progress[l.id].bestScore} 分</div>
                  </div>
                ))}
              </div>
            )}

            {badges.length > 0 && (
              <div style={{ marginBottom:"24px" }}>
                <div style={{ fontSize:"12px", color:C.textMuted, letterSpacing:"2px", marginBottom:"12px" }}>🏅 獲得徽章</div>
                <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                  {badges.map(bid => {
                    const b = BADGES.find(x => x.id === bid);
                    return b ? (
                      <div key={bid} style={{ background:"rgba(76,175,80,0.15)", border:"1px solid rgba(76,175,80,0.3)", borderRadius:"12px", padding:"8px 14px", display:"flex", alignItems:"center", gap:"8px" }}>
                        <span>{b.emoji}</span>
                        <div>
                          <div style={{ fontSize:"12px", fontWeight:"600", color:C.greenLight }}>{b.label}</div>
                          <div style={{ fontSize:"10px", color:C.textMuted }}>{b.desc}</div>
                        </div>
                      </div>
                    ) : null;
                  })}
                </div>
              </div>
            )}

            <div style={{ fontSize:"12px", color:C.textMuted, letterSpacing:"2px", marginBottom:"12px" }}>各關成績</div>
            {attempted.length === 0 && <div style={{ textAlign:"center", color:C.textDim, padding:"40px 0" }}>還沒有挑戰過任何關卡 🌱</div>}
            {attempted.map(l => {
              const p = progress[l.id];
              const history = p.scoreHistory || [p.lastScore].filter(Boolean);
              const last = history[history.length-1];
              const prev = history.length >= 2 ? history[history.length-2] : null;
              const diff = prev !== null ? last - prev : null;
              return (
                <div key={l.id} style={{ background: p.passed ? "rgba(76,175,80,0.07)" : C.bgCard, border:"1px solid " + (p.passed ? "rgba(76,175,80,0.2)" : "rgba(255,255,255,0.1)"), borderRadius:"14px", padding:"16px", marginBottom:"10px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"10px" }}>
                    <span style={{ fontSize:"20px" }}>{l.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:"13px", fontWeight:"600" }}>{l.title}</div>
                      <div style={{ fontSize:"11px", color:C.textMuted }}>挑戰 {p.attempts} 次{p.passed ? " · ✓ 已通過" : ""}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:"20px", fontWeight:"800", color: p.passed ? C.green : p.bestScore>=70 ? "#ffb74d" : "#ef9a9a" }}>{p.bestScore}</div>
                      {diff !== null && <div style={{ fontSize:"11px", color: diff>0 ? C.green : diff<0 ? "#ef5350" : C.textMuted }}>{diff>0 ? ("↑"+diff) : diff<0 ? ("↓"+Math.abs(diff)) : "—"}</div>}
                    </div>
                  </div>
                  <div style={{ height:"4px", background:"rgba(255,255,255,0.06)", borderRadius:"2px" }}>
                    <div style={{ height:"100%", width:(Math.min(100,p.bestScore) + "%"), background: p.passed ? "linear-gradient(90deg,#43a047,#66bb6a)" : p.bestScore>=70 ? "linear-gradient(90deg,#f57c00,#ffb74d)" : "linear-gradient(90deg,#c62828,#ef9a9a)", borderRadius:"2px" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [LEVELS] = useState(() => JSON.parse(LEVELS_RAW));
      const [screen, setScreen] = useState("login");
      const [player, setPlayer] = useState("");
      const [dName, setDName] = useState("");
      const [progress, setProgress] = useState({});
      const [level, setLevel] = useState(null);
      const [quizResult, setQuizResult] = useState(null);
      const [showWelcome, setShowWelcome] = useState(false);

      const handleLogin = (u, d, prog) => {
        setPlayer(u); setDName(d); setProgress(prog);
        if (Object.keys(prog).length === 0) setShowWelcome(true);
        setScreen("map");
      };

      const handleSelect = (l) => {
        setLevel(l); setQuizResult(null);
        setScreen(l.id === "level_19" ? "scenario" : "teaching");
      };

      const handleFinish = async (score, details) => {
        const l = level;
        const prev = progress[l.id] || {};
        const passed = score >= 90;
        const newProg = {
          ...progress,
          [l.id]: {
            passed: passed || prev.passed || false,
            bestScore: Math.max(score, prev.bestScore || 0),
            lastScore: score,
            attempts: (prev.attempts || 0) + 1,
            scoreHistory: [...(prev.scoreHistory || []), score],
          }
        };
        setProgress(newProg);
        saveProgress(player, newProg);
        setQuizResult({ score, details });
        setScreen("result");
        submitScore(player, dName, l.id, l.title, score, passed);
      };

      return (
        <div style={{ minHeight:"100vh", background:C.bg }}>
          {showWelcome && screen !== "login" && <WelcomeModal displayName={dName} onClose={() => setShowWelcome(false)} />}
          {screen === "login" && <LoginScreen onLogin={handleLogin} />}
          {screen === "map" && <LevelMap levels={LEVELS} progress={progress} displayName={dName} onSelect={handleSelect} onDash={() => setScreen("dashboard")} onLogout={() => { setScreen("login"); setPlayer(""); setDName(""); setProgress({}); }} />}
          {screen === "teaching" && level && <TeachingScreen level={level} onStart={() => setScreen("quiz")} onBack={() => setScreen("map")} />}
          {screen === "quiz" && level && <QuizScreen key={level.id} level={level} onFinish={handleFinish} onBack={() => setScreen("teaching")} />}
          {screen === "result" && quizResult && <ResultScreen score={quizResult.score} details={quizResult.details} levelTitle={level.title} onRetake={() => setScreen("teaching")} onMap={() => setScreen("map")} />}
          {screen === "scenario" && level && <ScenarioScreen level={level} onBack={() => setScreen("map")} />}
          {screen === "dashboard" && <DashboardScreen levels={LEVELS} progress={progress} displayName={dName} onClose={() => setScreen("map")} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
