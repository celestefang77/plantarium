  <script type="text/babel">
    const LEVELS_RAW = '[{"id": "level_01", "title": "屏風／吸音板使用", "emoji": "🪟", "teaching": {"sections": [{"heading": "屏風種類與數量", "content": "辦公室共有三種屏風：\\\\n① 藺草綠：7個，尺寸 930×1860×30mm\\\\n② 淺灰：11個，尺寸 930×1860×30mm\\\\n③ 亞麻白：10個，尺寸 630×1360×30mm（較小，平時放圖書館，一般不會用到）\\\\n\\\\n配件：屏風專用 T 型腳附輪子，共 28 個，尺寸 350×35×32mm。"}, {"heading": "如何使用屏風", "content": "屏風靠魔鬼氈互相連接。每片屏風兩側各有一個「魔鬼氈」面與一個「黏貼」面，互相扣住即可連接。\\\\n\\\\n⚠️ 若某片屏風兩側都沒有魔鬼氈，代表它是「邊端片」，應擺在整排的最首或最尾。\\\\n\\\\n步驟：\\\\n1. 依需要圍出的範圍排列屏風\\\\n2. 用魔鬼氈連接各片（最外側兩端使用無魔鬼氈的邊端片）\\\\n3. 排好後，用腳踩輪子上的卡榫固定，防止屏風滑動\\\\n4. 用完後放回原位，收納時將前後 T 型腳交錯排列，整齊且不易傾倒"}, {"heading": "適用場合", "content": "以下三種情況可使用屏風：\\\\n① 活動聲音過大影響其他區域（如策展區活動影響餐廳、書軒客人）\\\\n② 客人需要隱密性（如重要會議不想被打擾）\\\\n③ 策展區與會議室同時有人使用：可提前用屏風區隔，並圍出走道給會議室客人使用（此安排不需告知客戶）"}, {"heading": "重要注意事項", "content": "⚠️ 我們不會主動提供屏風租借，只有客人主動詢問時才會提供！\\\\n📍 屏風平時放置位置：會議室外面右邊。"}]}, "questions": [{"type": "single", "question": "藺草綠屏風共有幾個？", "options": ["5個", "7個", "10個", "11個"], "answer": 1, "explanation": "藺草綠屏風共有 7 個，尺寸為 930×1860×30mm。"}, {"type": "single", "question": "亞麻白屏風通常放在哪裡？平時是否會用到？", "options": ["放在倉庫，偶爾會用", "放在圖書館，一般不會用到", "放在會議室外，常常使用", "放在策展區，活動時使用"], "answer": 1, "explanation": "亞麻白屏風（較小尺寸 630×1360×30mm）通常放在圖書館，一般不會用到。"}, {"type": "truefalse", "question": "屏風排列時，兩側都沒有魔鬼氈的屏風應該擺在整排的中間位置。", "answer": false, "explanation": "錯誤！兩側都沒有魔鬼氈的屏風是邊端片，應放在整排的最首或最尾，不能放中間。"}, {"type": "single", "question": "排好屏風後，為了防止屏風滑動，下一步應該要做什麼？", "options": ["用膠帶固定在地板上", "用腳踩輪子上的卡榫固定", "將T型腳拆除", "用繩子綁住屏風"], "answer": 1, "explanation": "排好後要找到輪子上的卡榫，用腳踩下去固定，才不會亂跑。"}, {"type": "multiple", "question": "以下哪些情況適合使用屏風？（多選）", "options": ["活動聲音過大影響其他區域客人", "客人需要隱密性進行重要會議", "策展區與會議室同時有人使用", "辦活動時需要臨時隔出用餐或休息區域"], "answer": [0, 1, 2, 3], "explanation": "屏風適用於：聲音干擾、需要隱密性、策展區與會議室同時使用，以及辦活動時臨時隔出用餐或休息區域——四種情況皆可使用屏風。"}, {"type": "truefalse", "question": "當客人需要屏風時，我們應該主動詢問客人是否需要屏風服務。", "answer": false, "explanation": "錯誤！我們不會主動提供屏風租借，只有客人主動問我們才會提供。"}, {"type": "fill", "question": "屏風平時的放置地點是在____外面右邊。", "answer": "會議室", "explanation": "屏風平時放置位置為會議室外面右邊。"}, {"type": "single", "question": "收納屏風時，T型腳應如何擺放才能整齊且不易傾倒？", "options": ["全部朝同一方向", "前後T型腳交錯排列", "將T型腳拆下另外存放", "直接靠牆堆疊"], "answer": 1, "explanation": "收納時建議將前後T型腳交錯排列，這樣比較整齊也不會讓屏風跌倒。"}, {"type": "single", "question": "淺灰屏風共有幾個？", "options": ["7個", "10個", "11個", "28個"], "answer": 2, "explanation": "淺灰屏風共有 11 個，尺寸為 930×1860×30mm，是三種屏風中數量最多的。"}, {"type": "single", "question": "屏風使用完畢後，收納時T型腳應如何擺放才不易傾倒？", "options": ["全部朝同一方向", "前後T型腳交錯排列", "拆下T型腳另外存放", "用膠帶固定"], "answer": 1, "explanation": "收納時將前後T型腳交錯排列，這樣比較整齊也不易傾倒。"}, {"type": "truefalse", "question": "策展區與會議室同時有人使用時，可以提前用屏風圍出走道給會議室客人使用，不需要告知客戶。", "answer": true, "explanation": "正確！此安排不需告知客戶，行政人員主動提前安排即可。"}, {"type": "single", "question": "收納屏風時，為避免屏風傾倒，T型腳應如何擺放？", "options": ["全部朝同一方向整齊堆疊", "前後T型腳交錯排列", "拆下T型腳單獨存放", "用繩子綁住固定"], "answer": 1, "explanation": "收納時將前後T型腳交錯排列，這樣比較整齊也不易傾倒。"}, {"type": "single", "question": "屏風連接時，每片屏風兩側各有一個什麼面？", "options": ["黏貼面與魔鬼氈面", "磁鐵面與黏貼面", "魔鬼氈面與卡榫面", "螺絲面與黏貼面"], "answer": 0, "explanation": "每片屏風兩側各有一個「魔鬼氈」面與一個「黏貼」面，兩片互相扣住即可連接。"}, {"type": "truefalse", "question": "客人需要屏風隱密性時，行政人員應主動告知客人可以使用屏風服務。", "answer": false, "explanation": "錯誤！我們不會主動提供屏風租借，只有客人主動詢問時才會提供。"}, {"type": "fill", "question": "屏風專用T型腳附輪子共有____個。", "answer": "28", "explanation": "屏風專用T型腳附輪子共28個，尺寸350×35×32mm。"}]}, {"id": "level_02", "title": "中興保全門禁設定", "emoji": "🔐", "teaching": {"sections": [{"heading": "電腦後台登入", "content": "登入網址：220.130.160.66\\\\n公司選擇：01-預設公司\\\\n登入帳號：admin\\\\n密碼：Nimda1234\\\\n\\\\n⚠️ 門禁卡註冊完畢後，請同步更新資訊至「植境-門禁人員一覽表」。"}, {"heading": "基本資料維護", "content": "① 職務資料維護：公司編號 01、職務代碼 02、職務名稱「員工」（可依職務名稱增設）\\\\n\\\\n② 部門資料維護：按「新增」可增加部門；按「查詢」可查看目前名單\\\\n\\\\n③ 人員資料維護（重要）：\\\\n按「新增」後，須填寫以下欄位：\\\\n- 員工編號（依順序設定）\\\\n- 部門（選擇自己部門）\\\\n- 班表種類：計時\\\\n- 員工卡號：攜帶一卡通/悠遊卡，到大門機器感應，會出現數字\\\\n- 所在區域：台北\\\\n- APP遠端開門權限：否（植境行政人員為：是）\\\\n- 門禁權限：啟用\\\\n- 門禁群組：選擇「植境行政」或「工作人員」"}, {"heading": "初始設定", "content": "① 人員時區：需先設定「人員時區」，才能設定門禁群組，再填入人員資料。時區選項為「設為24hr通行」或「於指定時間靠卡進入」。\\\\n\\\\n② 門禁群組設定：點選人員時區清單 → 選擇可開啟的門別（兩扇門皆要選）→ 存檔\\\\n\\\\n③ 門別時區：\\\\n- 名稱：營業時間\\\\n- 門別：全部\\\\n- 日期：星期一～日\\\\n- 時間：10:00–20:00\\\\n- 模式：門常開"}, {"heading": "手機APP操作", "content": "① 下載 App：App Store / Play 商店搜尋「Dr.id」\\\\n② 登入資訊：\\\\n- 公司選擇：01-預設公司\\\\n- 登入帳號：員工編號\\\\n- 密碼：員工編號（第一次登入後請自行更改）\\\\n③ 登入後點擊「遠端開門」可遠端開啟大門或電梯門\\\\n④ 門於非營業時間會自動上鎖"}, {"heading": "門禁密碼與故障排除", "content": "門禁密碼：\\\\n- 植境行政：1279（24小時有效）\\\\n- 工作人員：5247（7:30–22:00有效）\\\\n\\\\n故障排除：\\\\n- 系統無法登入：前往東區會所向總務說明來意，借用1樓機櫃鑰匙，重啟中興保全機台\\\\n- 機台位置：東區會所廚房最內側小房間（機房），1樓機櫃最下層\\\\n- 其他問題：撥打中興保全免費電話 0800-043-777"}]}, "questions": [{"type": "fill", "question": "中興保全後台的登入網址是____。", "answer": "220.130.160.66", "explanation": "後台登入網址為 220.130.160.66，帳號 admin，密碼 Nimda1234。"}, {"type": "single", "question": "新增員工門禁卡號時，員工需要攜帶什麼去大門機器感應？", "options": ["員工識別證", "一卡通或悠遊卡", "護照", "信用卡"], "answer": 1, "explanation": "員工需攜帶一卡通或悠遊卡，到大門口感應機台，系統會顯示卡號數字。"}, {"type": "truefalse", "question": "植境行政人員的APP遠端開門權限應設定為「否」。", "answer": false, "explanation": "錯誤！一般員工設為「否」，但植境行政人員的APP遠端開門權限應設定為「是」。"}, {"type": "single", "question": "設定門禁群組前，必須先完成哪個步驟？", "options": ["先設定部門資料", "先設定人員時區", "先設定職務資料", "先下載Dr.id APP"], "answer": 1, "explanation": "必須先有「人員時區」設定，才能設定門禁群組，再填入人員資料的門禁群組欄位。"}, {"type": "multiple", "question": "設定門禁群組時，需要選擇哪些門別？（多選）", "options": ["只選主要大門", "兩扇門都要選", "視情況只選一扇", "不需選擇門別"], "answer": [1], "explanation": "設定門禁群組時，兩扇門皆要選，才能正確設定通行權限。"}, {"type": "single", "question": "工作人員的門禁密碼是什麼？有效時間為何？", "options": ["1279，24小時", "5247，24小時", "1279，7:30-22:00", "5247，7:30-22:00"], "answer": 3, "explanation": "工作人員門禁密碼為 5247，有效時間為 7:30–22:00。植境行政密碼 1279 才是 24 小時有效。"}, {"type": "fill", "question": "中興保全的免費客服電話是____。", "answer": "0800-043-777", "explanation": "其他問題可直接撥打中興保全免費電話 0800-043-777。"}, {"type": "single", "question": "系統無法登入時，應該去哪裡借機櫃鑰匙重啟機台？", "options": ["植境前台", "東區會所，向總務借用", "中興保全公司", "IT部門"], "answer": 1, "explanation": "系統無法登入時，請前往東區會所向總務說明來意，借用1樓機櫃鑰匙，到廚房最內側機房重啟機台。"}, {"type": "fill", "question": "中興保全後台的登入帳號是____。", "answer": "admin", "explanation": "後台登入帳號為 admin，密碼為 Nimda1234。"}, {"type": "single", "question": "Dr.id APP第一次登入後，密碼預設為什麼？", "options": ["Nimda1234", "員工編號", "1279", "手機號碼"], "answer": 1, "explanation": "Dr.id APP第一次登入時，密碼預設為員工編號，登入後請自行更改。"}, {"type": "truefalse", "question": "門禁卡註冊完畢後，需要同步更新至「植境-門禁人員一覽表」。", "answer": true, "explanation": "正確！門禁卡註冊後必須同步更新資訊至植境門禁人員一覽表，以利管理。"}, {"type": "single", "question": "中興保全機台重啟時，機台位於哪個位置？", "options": ["植境前台右側", "東區會所廚房最內側機房1樓機櫃最下層", "保全公司辦公室", "植境辦公室倉庫"], "answer": 1, "explanation": "機台位於東區會所廚房最內側小房間（機房）的1樓機櫃最下層。"}, {"type": "single", "question": "員工在門禁系統中，班表種類應設定為？", "options": ["固定班", "計時", "彈性班", "輪班"], "answer": 1, "explanation": "人員資料維護時，班表種類需設定為「計時」。"}, {"type": "fill", "question": "植境行政人員的門禁密碼是____。", "answer": "1279", "explanation": "植境行政密碼為1279，24小時有效；工作人員密碼5247，有效時間7:30-22:00。"}, {"type": "truefalse", "question": "Dr.id APP中，「遠端開門」功能可以開啟大門或電梯門。", "answer": true, "explanation": "正確！登入Dr.id APP後，點擊「遠端開門」可遠端開啟大門或電梯門（需有遠端開門權限）。"}]}, {"id": "level_03", "title": "植境官網後台使用", "emoji": "🌐", "teaching": {"sections": [{"heading": "後台登入資訊", "content": "登入網址：https://dogood.com.tw/login-plantarium/\\\\n帳號：plantarium_admin\\\\n密碼：ketF77YJh24do*mlTw3@Yh%m"}, {"heading": "功能對應說明", "content": "官網前台功能與後台編輯位置對應：\\\\n- 「報給你知」→ 後台「最新消息」編輯（類別：店家品牌、蔬食/健康知識）\\\\n- 「來找活動」→ 後台「展覽活動」編輯（類別：活動花絮回顧、活動資訊分享）\\\\n- 「探索植境」→ 後台「關於我們」編輯"}, {"heading": "首頁注意事項（重要！）", "content": "⚠️ 官網首頁有新舊兩個版本，都叫「首頁」！\\\\n- 新版首頁：發布時間為 2025 年 → 請編輯這個\\\\n- 舊版首頁：發布時間為 2022 年 → 不要編輯，前台看不到效果\\\\n\\\\n更換首頁後，請到前台確認目前顯示的是哪個版本。"}, {"heading": "首頁圖片/影片規格", "content": "上方3大首圖可以選擇圖檔或影片檔：\\\\n- 圖片比例：1920×1080 像素\\\\n- 影片比例：9:16，最高支援 4K 畫質\\\\n\\\\n其他注意：\\\\n- 3號位置因白字不清晰，暫時不放文字\\\\n- 2號位置可在「網址」欄位放入連結，並自訂「連結文字」作為按鈕內容"}, {"heading": "文章新增步驟", "content": "① 點擊「最新消息」或「展覽活動」\\\\n② 點擊「新增」建立新文章\\\\n③ 填寫標題、內文\\\\n④ 點擊藍色「+」增加圖片，圖片建議比例 3:2\\\\n⑤ 點擊上下箭頭可調整圖片在段落中的位置\\\\n⑥ 點擊圖片旁的按鈕可新增圖片說明\\\\n⑦ 換行技巧：\\\\n   - Enter：換新段（行距較大）\\\\n   - Shift+Enter：同段換行（行距較小，同段文字大小/顏色相同）\\\\n⑧ 發布前，至「最新消息」欄位選擇封面照片（否則封面無照片）\\\\n⑨ 可用預覽功能查看桌機、手機、平板版面\\\\n⑩ 確認無誤後按「發布」"}, {"heading": "英文頁面與媒體庫", "content": "英文頁面：點擊頁面上方「中文」按鈕，即可切換至英文網頁進行編輯。\\\\n\\\\n媒體庫：後台儲存所有曾上傳的照片。選照片時可先查看媒體庫，避免重複上傳。\\\\n\\\\n網站問題聯絡：伊凡博達 / Ivan Chen / ivan@refine-lab.com / 02-2727-8128"}]}, "questions": [{"type": "single", "question": "官網前台「報給你知」的內容，應該在後台哪個位置編輯？", "options": ["關於我們", "展覽活動", "最新消息", "頁面設定"], "answer": 2, "explanation": "「報給你知」的內容對應後台的「最新消息」，類別為店家品牌或蔬食/健康知識。"}, {"type": "truefalse", "question": "官網有兩個版本的首頁，發布時間為2022年的是新版，應該編輯這個。", "answer": false, "explanation": "錯誤！2022年是舊版，編輯後前台看不到效果。應編輯發布時間為 2025 年的新版首頁。"}, {"type": "single", "question": "上方首圖的圖片規格應為多少像素？", "options": ["1080×1920", "1920×1080", "3:2比例即可", "1280×720"], "answer": 1, "explanation": "首頁上方3大首圖的圖片規格為 1920×1080 像素。"}, {"type": "multiple", "question": "新增文章時，以下哪些步驟是正確的？（多選）", "options": ["發布前要在「最新消息」選擇封面照片", "圖片建議使用3:2比例", "Enter和Shift+Enter的換行效果完全相同", "可用預覽功能查看手機版面"], "answer": [0, 1, 3], "explanation": "Enter（新段，行距大）和Shift+Enter（同段換行，行距小）效果不同，其他三項描述均正確。"}, {"type": "fill", "question": "官網前台「來找活動」的內容，對應後台的「____」進行編輯。", "answer": "展覽活動", "explanation": "「來找活動」對應後台「展覽活動」，類別為活動花絮回顧或活動資訊分享。"}, {"type": "single", "question": "如果要切換編輯英文版頁面，應該點擊哪裡？", "options": ["頁面設定 > 語言", "頁面上方的「中文」按鈕", "另開新分頁輸入英文網址", "需聯絡網站公司處理"], "answer": 1, "explanation": "點擊頁面上方的「中文」按鈕，即可切換至英文網頁進行編輯。"}, {"type": "truefalse", "question": "媒體庫中存有過去曾上傳的所有照片，選照片時可先查看媒體庫，避免重複上傳。", "answer": true, "explanation": "正確！媒體庫儲存所有曾上傳至後台的照片，可以直接從媒體庫選用，不需重複上傳。"}, {"type": "single", "question": "網站出現問題需要聯絡製作公司，負責人Ivan的聯絡信箱是？", "options": ["ivan@plantarium.com", "ivan@refine-lab.com", "admin@dogood.com.tw", "service@ivantech.com"], "answer": 1, "explanation": "網站製作公司伊凡博達，負責人 Ivan Chen，聯絡信箱為 ivan@refine-lab.com。"}, {"type": "single", "question": "官網前台「探索植境」的內容，應在後台哪個位置編輯？", "options": ["最新消息", "展覽活動", "關於我們", "頁面設定"], "answer": 2, "explanation": "「探索植境」對應後台的「關於我們」進行編輯。"}, {"type": "fill", "question": "首頁影片的建議比例為____，最高支援4K畫質。", "answer": "9:16", "explanation": "首頁影片比例為9:16，最高支援4K畫質；圖片則為1920×1080像素。"}, {"type": "truefalse", "question": "在後台新增文章時，按Enter和Shift+Enter的換行效果是一樣的。", "answer": false, "explanation": "錯誤！Enter是換新段（行距較大），Shift+Enter是同段換行（行距較小），效果不同。"}, {"type": "single", "question": "首頁2號位置可以在哪個欄位放入連結並自訂按鈕文字？", "options": ["標題欄位", "內文欄位", "網址欄位並設定連結文字", "圖片說明欄位"], "answer": 2, "explanation": "2號位置可在「網址」欄位放入連結，並在「連結文字」欄位自訂按鈕顯示的文字。"}, {"type": "fill", "question": "官網後台登入帳號是____。", "answer": "plantarium_admin", "explanation": "官網後台登入網址為 https://dogood.com.tw/login-plantarium/，帳號為 plantarium_admin。"}, {"type": "single", "question": "選照片時建議先查看媒體庫的原因是什麼？", "options": ["媒體庫的照片品質比較好", "避免重複上傳同一張照片", "媒體庫有自動分類功能", "節省後台儲存空間"], "answer": 1, "explanation": "後台媒體庫儲存所有曾上傳的照片，選照片前先查看，可避免重複上傳造成混亂。"}, {"type": "truefalse", "question": "首頁3號位置因白字不清晰，暫時不放文字。", "answer": true, "explanation": "正確！3號位置因白字不清晰，暫時不在該位置放置文字說明。"}]}, {"id": "level_04", "title": "植境直式電視操作", "emoji": "📺", "teaching": {"sections": [{"heading": "整體操作流程概覽", "content": "直式電視牆的操作分為四個主要步驟：\\\\n① USB 輸出圖像\\\\n② 定時器設置\\\\n③ 返回原始畫面播放"}, {"heading": "步驟一：USB 輸出圖像", "content": "1. 將 USB 碟插入電視\\\\n2. 電視牆會顯示提示畫面\\\\n3. 到播放器下方「內部記憶體」選單，選取「USB 記憶體」\\\\n4. 選取你要的圖像\\\\n5. 點右上角「選項」→「傳送」→ 按右鍵確認\\\\n6. 按「返回」到內部記憶體，確認圖像是否已傳送過去\\\\n✅ 第一步完成"}, {"heading": "步驟二：定時器設置", "content": "1. 到首頁選取「自動開關定時器」\\\\n2. 進入後會出現排程時間表\\\\n3. 確認時間是否為：開機 9:55 / 關機 22:00\\\\n4. 按確認鍵繼續\\\\n5. 點選提示畫面進入圖庫\\\\n6. 點右上角「選項」→「播放選定項目」→ 選取要播放的圖像 → 按確認\\\\n\\\\n⚠️ 如果遇到時間跳掉問題，請依照系統提示操作。"}, {"heading": "步驟三：返回原始畫面", "content": "1. 按 Home 鍵\\\\n2. 選取第一個「播放器」→ 按確認鍵\\\\n3. 點右上角「選項」\\\\n4. 找到「提示」選項 → 按確認鍵\\\\n5. 選取要播放的圖像\\\\n6. 按最上方中間的「完成」選項\\\\n✅ 設置完成！"}]}, "questions": [{"type": "single", "question": "操作直式電視牆的第一個步驟是什麼？", "options": ["設定定時器", "插入USB碟並輸出圖像", "按Home鍵回主畫面", "選取播放器"], "answer": 1, "explanation": "第一步是插入USB碟，到內部記憶體選取USB記憶體，再選取並傳送圖像。"}, {"type": "single", "question": "將USB圖像傳入內部記憶體時，完成傳送後應該怎麼確認成功？", "options": ["畫面會自動彈出成功通知", "按返回到內部記憶體查看是否有傳過去", "拔除USB碟即代表完成", "等待10秒自動確認"], "answer": 1, "explanation": "傳送後需按「返回」到內部記憶體，查看圖像是否已成功傳送過去。"}, {"type": "fill", "question": "定時器設置中，電視的開機時間應設定為____，關機時間為22:00。", "answer": "9:55", "explanation": "排程時間表中，開機時間為 9:55，關機時間為 22:00。"}, {"type": "truefalse", "question": "設定定時器時，在排程時間表確認時間後，不需要再做其他設定就完成了。", "answer": false, "explanation": "錯誤！確認時間後還需要點選提示畫面進入圖庫，選取要播放的圖像並確認，才算完成定時器設置。"}, {"type": "single", "question": "要返回原始畫面開始播放，第一步應該按哪個鍵？", "options": ["確認鍵", "選項鍵", "Home 鍵", "返回鍵"], "answer": 2, "explanation": "返回原始畫面的第一步是按 Home 鍵，然後選取第一個播放器。"}, {"type": "single", "question": "在返回原始畫面步驟中，選好要播放的圖像後，最後應按哪個選項完成？", "options": ["確認", "儲存", "完成", "播放"], "answer": 2, "explanation": "選取圖像後，按最上方中間的「完成」選項，這樣就設置完成了。"}, {"type": "multiple", "question": "以下關於直式電視操作的描述，哪些是正確的？（多選）", "options": ["第一步需插入USB碟", "定時器可設定自動開關機時間", "遇到時間跳掉要依提示操作", "操作完成後需拔除USB才能播放"], "answer": [0, 1, 2], "explanation": "前三項均正確。圖像傳到內部記憶體後就可以播放，不需保留USB碟。"}, {"type": "single", "question": "操作直式電視牆，要將USB圖像傳入內部記憶體，應點選哪個選項？", "options": ["複製", "移動", "傳送", "匯出"], "answer": 2, "explanation": "選取圖像後，點右上角「選項」→「傳送」→按右鍵確認，即可傳入內部記憶體。"}, {"type": "truefalse", "question": "直式電視操作中，定時器設置完成後，不需要再回到播放器做任何設定。", "answer": false, "explanation": "錯誤！定時器設置完成後，還需要回到播放器，透過「選項→提示→選取圖像→完成」才算全部設定完成。"}, {"type": "fill", "question": "直式電視操作的第三個步驟是「返回____播放」。", "answer": "原始畫面", "explanation": "三大步驟依序為：①USB輸出圖像、②定時器設置、③返回原始畫面播放。"}, {"type": "single", "question": "返回原始畫面步驟中，進入播放器後要點右上角選項，再找到哪個選項按確認？", "options": ["播放", "排程", "提示", "定時器"], "answer": 2, "explanation": "進入播放器後，點右上角「選項」→找到「提示」→按確認鍵，再選取圖像，最後按「完成」。"}, {"type": "truefalse", "question": "直式電視操作時，遇到時間跳掉的問題，應依照系統提示操作。", "answer": true, "explanation": "正確！若遇到定時器時間跳掉的問題，請依照系統提示進行操作即可。"}, {"type": "single", "question": "USB圖像傳送時，點選「選項」後下一步是什麼？", "options": ["直接按確認", "點選「傳送」再按右鍵確認", "點選「複製」", "點選「匯出」"], "answer": 1, "explanation": "點右上角「選項」→「傳送」→按右鍵確認，完成後按返回確認圖像是否已傳送成功。"}, {"type": "truefalse", "question": "直式電視共有三個操作步驟：USB輸出圖像、定時器設置、返回原始畫面播放。", "answer": true, "explanation": "正確！直式電視牆操作分為三個主要步驟：①USB輸出圖像→②定時器設置→③返回原始畫面播放。"}, {"type": "fill", "question": "定時器設置中，確認時間後需點選提示畫面進入圖庫，點右上角選項→「____」→選取圖像→確認。", "answer": "播放選定項目", "explanation": "定時器步驟：確認時間→點提示畫面進圖庫→選項→「播放選定項目」→選取圖像→按確認。"}]}, {"id": "level_05", "title": "空調系統設定", "emoji": "❄️", "teaching": {"sections": [{"heading": "登入能源管理系統", "content": "登入網址：能源管理系統\\\\n帳號：英文名字（第一個字母需大寫）\\\\n範例：Melody\\\\n\\\\n密碼：英文名字 + 生日月份 + 日期\\\\n範例：Melody1215（12月15日生）"}, {"heading": "選擇空調區域", "content": "登入後，點選需要設定的空調區域（例如：辦公室、策展區等），進入該區域的控制介面。"}, {"heading": "空調區域介面說明", "content": "介面中有兩種控制層級：\\\\n① 群控（紫色框）：一次控制該區域所有空調機台\\\\n② 單一機台（綠色框）：個別調整某一台空調\\\\n\\\\n⚠️ 重要注意事項：如果有調整單一機台，調整完後，請將「群控排程開關」先關閉再重新開啟，否則群控排程會與單機設定衝突。"}, {"heading": "設定空調排程", "content": "【新增固定排程（每週循環）】\\\\n1. 點選「排程」→「增加排程」\\\\n2. 選擇「每週排程」\\\\n3. 設定循環週期（週一至週日）與時間\\\\n\\\\n【變更單一日期排程】\\\\n1. 點選「排程」→「編輯事件排程」\\\\n2. 選擇特定日期與時間\\\\n3. 將「優先權」調至「1-高」\\\\n→ 設定完成後可覆蓋原定的固定排程\\\\n\\\\n💡 植境聯絡電話：(02)2756-0327"}]}, "questions": [{"type": "single", "question": "登入能源管理系統的帳號格式為何？", "options": ["員工編號", "英文名字（第一字母大寫）", "電子郵件地址", "中文姓名"], "answer": 1, "explanation": "帳號為英文名字，且第一個英文字母需大寫，例如 Melody。"}, {"type": "fill", "question": "小明的英文名字是 Jason，生日是3月5日，他的密碼應該是____。", "answer": "Jason0305", "explanation": "密碼格式為英文名字＋生日月份（兩位）＋日期（兩位），Jason 生日 3月5日 → Jason0305。"}, {"type": "truefalse", "question": "調整單一空調機台後，不需要做任何額外操作，群控排程仍會正常運作。", "answer": false, "explanation": "錯誤！調整單一機台後，必須將群控排程開關先「關閉」再「開啟」，否則排程會與單機設定衝突。"}, {"type": "single", "question": "介面中紫色框代表什麼功能？", "options": ["單一機台控制", "群控，一次控制所有空調", "溫度顯示", "節能模式"], "answer": 1, "explanation": "紫色框為群控，可一次控制該區域所有空調機台同步作業。"}, {"type": "single", "question": "如果想在特定某一天覆蓋原本固定排程，優先權應設定為多少？", "options": ["0（最低）", "1-高", "5-中", "不需設定優先權"], "answer": 1, "explanation": "編輯事件排程時，需將優先權調至「1-高」，才能覆蓋原定的固定排程。"}, {"type": "multiple", "question": "以下關於空調設定的描述，哪些是正確的？（多選）", "options": ["帳號第一個字母需大寫", "密碼包含英文名字和生日", "調整單機後需重啟群控開關", "事件排程優先權設0才能覆蓋固定排程"], "answer": [0, 1, 2], "explanation": "前三項正確。覆蓋固定排程需將優先權設為「1-高」，不是0。"}, {"type": "single", "question": "能源管理系統中，綠色框代表什麼功能？", "options": ["群控，控制所有機台", "單一機台個別控制", "溫度警示", "節能模式"], "answer": 1, "explanation": "綠色框代表單一機台，可個別調整某一台空調；紫色框才是群控。"}, {"type": "fill", "question": "若要新增每週固定循環的空調排程，應點選「排程」→「____」。", "answer": "增加排程", "explanation": "新增固定排程（每週循環）的路徑為：點選「排程」→「增加排程」→選擇「每週排程」。"}, {"type": "truefalse", "question": "事件排程的優先權設為「1-高」後，可以覆蓋原定的固定每週排程。", "answer": true, "explanation": "正確！編輯事件排程時，將優先權調至「1-高」，即可覆蓋原定的固定排程，適用於特殊日期的排程調整。"}, {"type": "single", "question": "植境的聯絡電話是？", "options": ["(02)2756-0327", "(02)8768-3328", "(03)384-0018", "(02)87918638"], "answer": 0, "explanation": "植境聯絡電話為 (02)2756-0327，列於空調系統設定懶人包中。"}, {"type": "truefalse", "question": "能源管理系統的密碼格式是「英文名字+生日年份」。", "answer": false, "explanation": "錯誤！密碼格式為「英文名字+生日月份（兩位）+日期（兩位）」，不包含年份。例如Melody生日12月15日→Melody1215。"}, {"type": "single", "question": "能源管理系統帳號，英文名字Andy生日9月3日，密碼應該是？", "options": ["andy0903", "Andy903", "Andy0903", "ANDY0903"], "answer": 2, "explanation": "密碼格式：英文名字（第一字母大寫）+月份兩位+日期兩位，Andy生日9月3日→Andy0903。"}, {"type": "fill", "question": "調整完單一空調機台後，必須將群控排程開關先____再重新開啟。", "answer": "關閉", "explanation": "調整單一機台後，需將群控排程開關先「關閉」再「開啟」，否則會與單機設定衝突。"}, {"type": "truefalse", "question": "每週排程設定完成後，若特定日期需要不同的空調時間，只能手動臨時調整，無法用系統覆蓋。", "answer": false, "explanation": "錯誤！可透過「編輯事件排程」設定特定日期，並將優先權調至「1-高」來覆蓋固定排程。"}, {"type": "single", "question": "能源管理系統中，要設定每週固定循環排程，第一步應點選什麼？", "options": ["事件排程", "增加排程", "群控設定", "機台管理"], "answer": 1, "explanation": "新增固定排程：點選「排程」→「增加排程」→選擇「每週排程」→設定週期與時間。"}]}, {"id": "level_06", "title": "客梯防火鐵捲門排除", "emoji": "🚨", "teaching": {"sections": [{"heading": "排除障礙三步驟", "content": "當客梯防火鐵捲門異常關閉時，依序執行以下三個步驟：\\\\n\\\\n① 立即通報警報\\\\n→ 即刻通報當值主管協助處理，並立刻解除受信總機警報\\\\n\\\\n② 打開上方門鎖\\\\n→ 需要一個可以墊高的物品，踩上去打開上方的門鎖\\\\n\\\\n③ 拿出開關遙控器\\\\n→ 拿出遙控器，按「↑」按鈕開啟閘門"}, {"heading": "常見異常狀況處理", "content": "① 鐵門無法升起\\\\n可能原因：無電 / 遙控器沒電\\\\n處理方式：確認電源供應 / 更換電池\\\\n\\\\n② 門卡半開不動\\\\n可能原因：障礙物卡住\\\\n處理方式：清除門下方異物並重啟\\\\n\\\\n③ 警報無法解除\\\\n可能原因：系統尚未復歸\\\\n處理方式：依照系統指示操作"}, {"heading": "操作注意事項", "content": "✅ 本懶人包僅供現場初步處理，不可自行拆修\\\\n⚠️ 若持續異常，應立即通報專業維修廠商\\\\n\\\\n操作安全規範：\\\\n- 操作前請確認現場無人通行\\\\n- 開門需兩人合作，注意重物掉落風險\\\\n\\\\n不建議操作的情境（直接聯絡廠商）：\\\\n- 鐵門明顯傾斜或變形\\\\n- 鐵門底部有卡物，但無法目視清楚\\\\n- 門體發出異常聲響"}]}, "questions": [{"type": "single", "question": "客梯防火鐵捲門異常時，第一步應該做什麼？", "options": ["直接用遙控器開門", "立即通報當值主管並解除受信總機警報", "自行拆修鐵門", "等待廠商到場"], "answer": 1, "explanation": "第一步是立即通報當值主管，並解除受信總機的警報，這是最優先的動作。"}, {"type": "single", "question": "遙控器應按哪個按鈕來開啟鐵捲門閘門？", "options": ["↓（向下）", "○（圓形）", "↑（向上）", "□（方形）"], "answer": 2, "explanation": "拿出遙控器後，按「↑」向上按鈕來開啟閘門。"}, {"type": "truefalse", "question": "鐵門底部有卡物但無法目視清楚時，仍可以嘗試自行操作排除。", "answer": false, "explanation": "錯誤！鐵門底部有卡物但無法目視清楚，是「不建議操作」的情境之一，應直接聯絡專業維修廠商。"}, {"type": "single", "question": "鐵門無法升起，最可能的原因是什麼？", "options": ["系統尚未復歸", "障礙物卡住", "無電或遙控器沒電", "門鎖未解除"], "answer": 2, "explanation": "鐵門無法升起的可能原因是無電或遙控器電池沒電，應確認電源供應或更換電池。"}, {"type": "multiple", "question": "以下哪些是「不建議自行操作」的情境？（多選）", "options": ["鐵門明顯傾斜或變形", "門卡半開可目視清楚有異物", "門體發出異常聲響", "鐵門底部有卡物但無法目視清楚"], "answer": [0, 2, 3], "explanation": "明顯傾斜/變形、異常聲響、無法目視清楚的底部卡物，這三種情況不建議操作，應直接通報廠商。可目視清楚的異物可清除後重啟。"}, {"type": "truefalse", "question": "操作防火鐵捲門時，一個人就可以完成，不需要兩人合作。", "answer": false, "explanation": "錯誤！開門需兩人合作，並注意重物掉落風險，單人操作有安全疑慮。"}, {"type": "fill", "question": "當警報無法解除時，可能的原因是系統____，應依照系統指示操作。", "answer": "尚未復歸", "explanation": "警報無法解除的原因是系統尚未復歸，需依照系統指示完成復歸程序。"}, {"type": "single", "question": "排除鐵捲門的第二步驟是什麼？", "options": ["拿出遙控器按↑", "打開上方門鎖（需墊高物品）", "解除受信總機警報", "通報廠商"], "answer": 1, "explanation": "三步驟依序：①通報主管並解除警報→②踩高物打開上方門鎖→③用遙控器按↑開啟閘門。"}, {"type": "truefalse", "question": "鐵門操作時，一個人就能安全完成，不需要他人協助。", "answer": false, "explanation": "錯誤！開門需兩人合作，注意重物掉落風險，單人操作存在安全疑慮。"}, {"type": "single", "question": "門卡半開不動，最可能的原因是什麼？", "options": ["遙控器沒電", "障礙物卡住", "系統尚未復歸", "停電"], "answer": 1, "explanation": "門卡半開不動的可能原因是障礙物卡住，應清除門下方異物後重啟。"}, {"type": "fill", "question": "防火鐵捲門懶人包說明，本懶人包僅供現場初步____，不可自行拆修。", "answer": "處理", "explanation": "本懶人包僅供現場初步處理，若持續異常應立即通報專業維修廠商。"}, {"type": "truefalse", "question": "鐵門明顯傾斜或變形時，可以先嘗試自行用遙控器操作，不行再叫廠商。", "answer": false, "explanation": "錯誤！鐵門明顯傾斜或變形是「不建議操作」的情境，應直接聯絡廠商，不要自行操作。"}, {"type": "single", "question": "防火鐵捲門排除障礙的正確順序是？", "options": ["遙控開門→解除警報→通報主管", "通報主管並解除警報→打開上方門鎖→遙控開門", "打開門鎖→通報主管→遙控開門", "解除警報→遙控開門→通報主管"], "answer": 1, "explanation": "正確順序：①通報主管並解除受信總機警報→②墊高物品打開上方門鎖→③用遙控器按↑開啟閘門。"}, {"type": "truefalse", "question": "遙控器電池沒電是鐵門無法升起的可能原因之一。", "answer": true, "explanation": "正確！鐵門無法升起的可能原因包含無電及遙控器沒電，應確認電源供應或更換遙控器電池。"}, {"type": "fill", "question": "操作防火鐵捲門前，必須確認現場____，才能開始操作。", "answer": "無人通行", "explanation": "操作安全規範第一條：操作前請確認現場無人通行，確保安全後才能開始操作。"}]}, {"id": "level_07", "title": "展演活動區設備操作", "emoji": "🎤", "teaching": {"sections": [{"heading": "投影幕介紹", "content": "展演區使用平板控制台（tablet）管理所有投影設備，介面上的按鈕對應如下：\\\\n\\\\n- 快速模式（QUICK MODE）：同時控制全部投影幕\\\\n- 電視牆（LCD）：舞台中間的投影幕\\\\n- 左投影機（LEFT PROJECTOR）：靠近會議室的螢幕\\\\n- 右投影機（RIGHT PROJECTOR）：主舞台螢幕\\\\n- 音量（VOLUME）：進入音量調整介面\\\\n- 結束簡報（End projection on all devices）：關閉所有投影"}, {"heading": "電視牆投影位置", "content": "場地內有三個 PC 訊號輸入點：\\\\n- PC1：舞台左側牆上\\\\n- PC2：黑色機櫃左側\\\\n- PC3：黑色機櫃右側\\\\n\\\\n⚠️ 重要提醒：使用電視牆時，HDMI線要接PC1，螢幕也請切換至PC1。"}, {"heading": "音量控制：麥克風與電腦音量", "content": "音量控制介面（VOLUME CONTROL）說明：\\\\n\\\\n輸入音量（INPUT）：\\\\n- MIC 1～3：無線麥克風\\\\n- MIC 4：耳掛麥克風\\\\n- PC：電腦音源（需接HDMI）\\\\n- 3.5mm：3.5mm音源輸入\\\\n\\\\n每個聲道各有：調大 / 開關靜音 / 調小 三個按鈕\\\\n\\\\n🔊 麥克風為環繞音效設計，請以觀眾席實際聽到的音量大小作為調整依據，不要只看數值。"}, {"heading": "活動區輸出喇叭（ZONE）", "content": "喇叭音量（SPEAKER）分為四個區域：\\\\n- ZONE 1：舞台\\\\n- ZONE 2：舞台正後方\\\\n- ZONE 3：服務台\\\\n- ZONE 4：超市\\\\n\\\\n各區域可獨立調整音量大小與靜音。"}, {"heading": "常見問題排除", "content": "Q：螢幕投影出不來？\\\\nA：將電腦解析度設定為 1920×1080\\\\n- Windows：電腦設定 > 顯示器解析度\\\\n- Mac：系統設定 > 顯示器解析度\\\\n\\\\nQ：無法播放電腦音樂至活動區喇叭？\\\\nA：依序檢查：\\\\n① 電腦音源輸出裝置（需選外部裝置，非電腦內建喇叭）\\\\n② 簡報或播放軟體的音效輸出設定\\\\n③ 確認平板控制台選擇的PC是否為實際連接的那台\\\\n\\\\nQ：麥克風有雜音、回音或嘯叫？\\\\nA：用平板調整音量或更換電池，同時遠離其他干擾源\\\\n📦 全新電池放在講台下方的透明盒內"}]}, "questions": [{"type": "single", "question": "平板控制台上的「QUICK MODE」按鈕功能是什麼？", "options": ["只開啟電視牆", "同時控制全部投影幕", "進入音量調整介面", "關閉所有設備"], "answer": 1, "explanation": "快速模式（QUICK MODE）可以同時控制全部投影幕，是最快速的全開方式。"}, {"type": "single", "question": "展演活動區共有幾個PC訊號輸入端口，可以投出幾個畫面？", "options": ["1個端口，只能投1個畫面", "2個端口，最多2個畫面", "3個端口（PC1/PC2/PC3），最多3個畫面，可同步或分開", "4個端口，最多4個畫面"], "answer": 2, "explanation": "場地內共有3個PC訊號輸入點：PC1舞台左側、PC2黑色機櫃左側、PC3黑色機櫃右側。可以同步播放同一畫面，也可以分別投出3個不同畫面，搭配3個螢幕使用。"}, {"type": "single", "question": "MIC 4 是哪種類型的麥克風？", "options": ["無線麥克風", "有線手持麥克風", "耳掛麥克風", "領夾麥克風"], "answer": 2, "explanation": "MIC1~3是無線麥克風，MIC4是耳掛麥克風。"}, {"type": "single", "question": "調整麥克風音量時，應以什麼作為判斷依據？", "options": ["控制台顯示的數值", "舞台上演講者的感受", "觀眾席實際聽到的音量大小", "固定設在50%即可"], "answer": 2, "explanation": "麥克風為環繞音效設計，應以觀眾席實際聽到的音量大小作為調整依據。"}, {"type": "fill", "question": "服務台的喇叭屬於哪個ZONE？答：ZONE____。", "answer": "3", "explanation": "ZONE1舞台、ZONE2舞台正後方、ZONE3服務台、ZONE4超市。"}, {"type": "single", "question": "電腦音樂無法播放至活動區喇叭時，第一個應該檢查什麼？", "options": ["重開電腦", "電腦音源輸出裝置是否選到外部裝置", "更換HDMI線", "重啟平板控制台"], "answer": 1, "explanation": "應依序檢查：①電腦音源輸出裝置（非電腦內建喇叭）→②播放軟體設定→③確認平板選的PC是否正確。"}, {"type": "truefalse", "question": "螢幕投影出不來時，只需要在Mac電腦上調整，Windows不需要調整解析度。", "answer": false, "explanation": "錯誤！Windows和Mac都需要將解析度調整為1920×1080，只是設定路徑不同。"}, {"type": "fill", "question": "麥克風電池需要更換時，全新電池放在____下方的透明盒內。", "answer": "講台", "explanation": "全新電池放在講台下方的透明盒內，方便隨時更換。"}, {"type": "single", "question": "ZONE 4（超市）的喇叭可以獨立調整音量，與其他區域互不影響，對嗎？", "options": ["對，各ZONE獨立控制", "不對，只能群體控制", "不對，超市沒有喇叭", "對，但只能靜音不能調音量"], "answer": 0, "explanation": "各ZONE（舞台/舞台後方/服務台/超市）可以獨立調整音量大小與靜音，互不影響。"}, {"type": "fill", "question": "麥克風出現嘯叫聲時，可以用平板調整音量或更換電池，全新電池放在____下方的透明盒內。", "answer": "講台", "explanation": "全新電池放在講台下方的透明盒內，方便隨時取用更換。"}, {"type": "truefalse", "question": "展演區的PC1位於黑色機櫃左側。", "answer": false, "explanation": "錯誤！PC1位於舞台左側牆上，PC2才是黑色機櫃左側，PC3是黑色機櫃右側。"}, {"type": "single", "question": "平板控制台上的「End projection on all devices」功能是什麼？", "options": ["開啟所有投影幕", "切換到QUICK MODE", "關閉所有投影", "調整音量"], "answer": 2, "explanation": "「End projection on all devices（結束簡報）」功能是一次關閉所有投影設備。"}, {"type": "single", "question": "Mac電腦要調整顯示器解析度，應該到哪裡設定？", "options": ["控制台>顯示器", "系統設定>顯示器解析度", "Finder>偏好設定", "Apple選單>關於這台Mac"], "answer": 1, "explanation": "Mac電腦的解析度調整路徑：系統設定→顯示器解析度，設定為1920×1080。"}, {"type": "truefalse", "question": "ZONE 2 的喇叭位於舞台正後方。", "answer": true, "explanation": "正確！ZONE1舞台、ZONE2舞台正後方、ZONE3服務台、ZONE4超市。"}, {"type": "single", "question": "展演活動區平板控制台上，「LEFT PROJECTOR」對應哪個螢幕？", "options": ["舞台中間的電視牆", "靠近會議室的螢幕", "主舞台螢幕", "機櫃旁的小螢幕"], "answer": 1, "explanation": "LEFT PROJECTOR（左投影機）對應靠近會議室的螢幕；RIGHT PROJECTOR（右投影機）是主舞台螢幕。"}]}, {"id": "level_08", "title": "清潔維護工作", "emoji": "🧹", "teaching": {"sections": [{"heading": "清潔人員安排", "content": "清潔工作由外包清潔人員負責：\\\\n- 週一至週五：張阿姨（穿黑色衣服）\\\\n- 週末：其他阿姨\\\\n\\\\n聯絡方式：0966-591-864\\\\n\\\\n⚠️ 廁所垃圾桶由朝代大廈其他人員收拾，不需要我們處理。"}, {"heading": "清潔人員固定工作項目", "content": "我們需要協助確認清潔人員完成以下事項：\\\\n① 早班需開啟通往廁所與電梯的安全門\\\\n② 定時檢查備品（衛生紙、洗手乳、酒精）\\\\n③ 環境整潔（廁所、哺乳室、洗手台、地板、戶外空間等）"}, {"heading": "廁所整理重點", "content": "清潔廁所時需重點確認：\\\\n① 廁所隔間：馬桶蓋、隔間地板、是否堵塞\\\\n② 洗手台：水漬及台內殘渣（客人可能會漱口）\\\\n③ 地板：可能被噴濕，需擦乾\\\\n④ 衛生紙數量：每間廁所共需四串（架上兩串＋架下兩串）"}, {"heading": "廁所堵塞處理", "content": "遇到廁所堵塞，可以使用：\\\\n① 搋子（ㄔㄨㄞ子）：通馬桶工具，直接疏通\\\\n② 威猛先生（通樂粉）＋熱水：倒入後用熱水沖\\\\n\\\\n通樂粉開啟方法：壓 → 轉 → 開"}, {"heading": "育嬰室（哺乳室）檢查重點", "content": "① 檢查備品：尿布、濕紙巾、捲筒衛生紙\\\\n② 檢查垃圾桶：台上小垃圾桶＋底下小垃圾桶\\\\n③ 檢查熱水壺內是否有水\\\\n④ 下班前拔掉插頭（上班時確認有插上）\\\\n\\\\n熱水壺使用方法：壓 → 拿"}, {"heading": "廠商合約資訊", "content": "太子物業公司（清潔外包）：\\\\n- 聯絡地址：台北市信義區東興路49號8樓\\\\n- 電話：(02)8768-3328\\\\n- 承辦人：陳自立經理 0933-125-015\\\\n- 聯絡窗口：高菲 0909-171-071\\\\n- 合約：一年簽訂一次，每月10日開立發票，我方需於30/31日前匯款\\\\n\\\\nDUSKIN樂清（定期更換地墊、芳香、酒精）：\\\\n- 電話：(02)2760-6091\\\\n- 業務：李建興 0960-755-243"}]}, "questions": [{"type": "single", "question": "週一至週五負責清潔的張阿姨有什麼特徵方便辨識？", "options": ["戴紅色帽子", "穿黑色衣服", "穿藍色制服", "戴口罩"], "answer": 1, "explanation": "張阿姨週一到週五上班，穿黑色衣服，聯絡電話 0966-591-864。"}, {"type": "truefalse", "question": "廁所垃圾桶需要由我們的清潔人員負責收拾。", "answer": false, "explanation": "錯誤！廁所垃圾桶由朝代大廈的其他人員收拾，不需要我們的清潔阿姨處理。"}, {"type": "single", "question": "每間廁所的衛生紙應補充幾串？如何分配？", "options": ["兩串，全放架上", "三串，架上一串、架下兩串", "四串，架上兩串、架下兩串", "六串，架上三串、架下三串"], "answer": 2, "explanation": "每間廁所共需四串衛生紙，架上兩串、架下兩串。"}, {"type": "single", "question": "使用通樂粉（威猛先生）開蓋的正確順序是？", "options": ["拉→轉→開", "壓→轉→開", "轉→壓→開", "扭→拉→開"], "answer": 1, "explanation": "通樂粉開啟方法為：壓→轉→開，這是防兒童誤開的安全設計。"}, {"type": "multiple", "question": "育嬰室每日需要檢查哪些備品？（多選）", "options": ["尿布", "濕紙巾", "口罩", "捲筒衛生紙"], "answer": [0, 1, 3], "explanation": "育嬰室備品需檢查：尿布、濕紙巾、捲筒衛生紙。口罩不在育嬰室備品清單內。"}, {"type": "truefalse", "question": "下班前需確認育嬰室熱水壺有水（避免乾燒），並拔掉空氣清淨機和風扇的插頭；上班時確認兩者都有插上才能使用。", "answer": true, "explanation": "正確！下班前要做兩件事：①確認熱水壺內有水，避免乾燒；②拔掉空氣清淨機和風扇的插頭。上班時確認熱水壺有水並將兩者插上。"}, {"type": "fill", "question": "太子物業公司每月於____日開立發票請款，我方需在月底前匯款。", "answer": "10", "explanation": "太子物業每月10日開立發票，我方應於每月30/31日前完成匯款。"}, {"type": "single", "question": "DUSKIN樂清定期來訪的目的是什麼？", "options": ["清潔廁所", "更換地墊、芳香、酒精等", "維修電梯", "補充衛生紙"], "answer": 1, "explanation": "DUSKIN樂清會固定時間來更換地墊、芳香、酒精等耗材，聯絡業務李建興 0960-755-243。"}, {"type": "fill", "question": "清潔阿姨的聯絡電話是____。", "answer": "0966-591-864", "explanation": "張阿姨（週一至週五）的聯絡電話為 0966-591-864。"}, {"type": "single", "question": "廁所堵塞時，除了搋子之外，還可以用什麼方式處理？", "options": ["直接灌清水", "通樂粉（威猛先生）加熱水", "鹽酸", "報告廠商等待維修"], "answer": 1, "explanation": "可用通樂粉（威猛先生）倒入後，再用熱水沖，開瓶方式為：壓→轉→開。"}, {"type": "truefalse", "question": "清潔阿姨的固定工作之一是在早班開啟通往廁所與電梯的安全門。", "answer": true, "explanation": "正確！早班需開啟通往廁所與電梯的安全門，是清潔人員的固定工作項目之一。"}, {"type": "single", "question": "太子物業公司的承辦人是誰？", "options": ["陳自立經理", "高菲", "李建興", "張阿姨"], "answer": 0, "explanation": "太子物業公司承辦人為陳自立經理，聯絡電話0933-125-015；高菲為聯絡窗口。"}, {"type": "single", "question": "DUSKIN樂清的業務聯絡人是誰？", "options": ["陳自立", "高菲", "李建興", "張阿姨"], "answer": 2, "explanation": "DUSKIN樂清業務為李建興，聯絡電話0960-755-243，負責定期更換地墊、芳香、酒精。"}, {"type": "truefalse", "question": "廁所洗手台需要特別注意水漬及台內殘渣，因為客人可能會漱口。", "answer": true, "explanation": "正確！清潔廁所時，洗手台需注意水漬及台內殘渣，因為客人有時會在洗手台漱口。"}, {"type": "fill", "question": "太子物業公司的聯絡電話是____。", "answer": "(02)8768-3328", "explanation": "太子物業公司（清潔外包）電話為(02)8768-3328，地址台北市信義區東興路49號8樓。"}]}, {"id": "level_09", "title": "場地租借系統管理", "emoji": "📋", "teaching": {"sections": [{"heading": "系統帳號密碼", "content": "Tinybook 後台：\\\\n- 電子信箱：plantarium.booking@gmail.com\\\\n- 登入密碼：plantarium!@#2023\\\\n\\\\n場租電子信箱：\\\\n- 帳號：plantarium.booking@gmail.com\\\\n- 密碼：plantarium2023\\\\n\\\\n藍新金流服務平台：\\\\n- 公司統一編號：94174566\\\\n- 管理者帳號：plantarium2023\\\\n- 管理者密碼：94174566"}, {"heading": "租借流程（後台登記四步驟）", "content": "客戶完成預約後，行政人員需完成以下四個步驟：\\\\n\\\\n步驟01：在 Tinybook 後台「預定管理」查看新訂單，確認預約時間、品項、加購項目、預約狀態。如客戶已匯款，將預約狀態改為「已付款」。完成後點選「儲存預約」。\\\\n\\\\n步驟02：將訂單資料輸入至 Excel「場地租賃總表」，讓全體同仁掌握場地租借狀況。\\\\n\\\\n步驟03：在 Tinybook 後台「訂單管理」確認發票開立、購買品項、訂單狀態。完成後點選「更新」。\\\\n\\\\n步驟04：將訂單管理資料輸入至 Excel（備註訂單相關資訊，供查帳使用）。"}, {"heading": "發票開立常見QA", "content": "【何時可以作廢發票？】\\\\n① 發票開立後尚未上傳平台 → 可直接作廢＋重開\\\\n② 發票已上傳，仍在「當期」申報期內 → 申報截止前可作廢＋重開\\\\n   - 當期 = 國稅局雙月期（例：5–6月期，截止日為7/15）\\\\n③ 跨期後不可作廢 → 只能開折讓單後重開\\\\n\\\\n【跨期處理流程】\\\\nStep1：對原發票開立「折讓單」，將金額全部沖回\\\\nStep2：重新開立一張正確金額的新發票（日期以當天為準，不可回填舊日期）\\\\n\\\\n⚠️ 稅金不會因此多繳或少繳，收入只是調整至新期別。"}, {"heading": "發票異動處理SOP", "content": "適用情況：客戶反應發票金額錯誤、未收到發票、需要重開發票等。\\\\n\\\\n① 請客戶先確認是否收到發票通知信（寄件人含「Ezpay-mainpage」）\\\\n② 若未收到 → 請對方檢查垃圾郵件/推廣/促銷信件分類\\\\n③ 若仍未找到 → 進入重開程序：\\\\n   - 當期內：直接作廢＋確認金額＋重開\\\\n   - 跨期：開折讓單＋確認金額＋重開\\\\n④ 通知客戶發票已重新開立\\\\n⑤ 於發票管理系統記錄原因（避免重複發生）"}]}, "questions": [{"type": "fill", "question": "Tinybook後台的登入密碼是____。", "answer": "plantarium!@#2023", "explanation": "Tinybook後台密碼為 plantarium!@#2023，注意含特殊符號，與場租電子信箱密碼不同。"}, {"type": "single", "question": "客戶已匯款後，在Tinybook後台應將預約狀態改為什麼？", "options": ["待確認", "已付款", "已完成", "處理中"], "answer": 1, "explanation": "確認客戶已匯款後，需將預約狀態更改為「已付款」，並點選儲存預約。"}, {"type": "single", "question": "登記步驟02要求將訂單資料輸入至哪個地方？", "options": ["Tinybook後台備注", "Excel場地租賃總表", "藍新金流後台", "Google日曆"], "answer": 1, "explanation": "步驟02需將訂單資料輸入至Excel「場地租賃總表」，讓全體同仁掌握場地租借狀況。"}, {"type": "truefalse", "question": "發票在5月開立，7月才發現金額錯誤，此時可以直接作廢並重開。", "answer": false, "explanation": "錯誤！5–6月期的申報截止日為7/15，已屬跨期，不可直接作廢，只能開折讓單後再重開新發票。"}, {"type": "single", "question": "跨期發票需要處理時，正確順序為何？", "options": ["直接重開新發票", "開折讓單沖掉舊發票，再開新發票", "通知客戶自行處理", "聯絡國稅局申請特例"], "answer": 1, "explanation": "跨期處理：Step1 對原發票開立折讓單將金額沖回，Step2 重新開立正確金額的新發票（日期為當天）。"}, {"type": "truefalse", "question": "重新開立的發票，日期可以回填為原始發票的日期。", "answer": false, "explanation": "錯誤！新發票日期必須以「重開當日」為準，不可回填舊日期，這是國稅局的規定。"}, {"type": "single", "question": "客戶反應未收到發票，第一步應該請客戶做什麼？", "options": ["直接進入重開程序", "先確認是否收到含Ezpay-mainpage寄件人的信件", "聯絡藍新金流客服", "重新下單"], "answer": 1, "explanation": "SOP第一步是請客戶先確認是否收到發票通知信（寄件人含Ezpay-mainpage），再確認垃圾郵件夾，確定沒有才進入重開程序。"}, {"type": "fill", "question": "國稅局5–6月期的申報截止日是____。", "answer": "7/15", "explanation": "國稅局採雙月期申報，每期截止日為下個月15日，5–6月期截止日為7月15日。"}, {"type": "fill", "question": "場租電子信箱的登入密碼是____。", "answer": "plantarium2023", "explanation": "場租電子信箱帳號 plantarium.booking@gmail.com，密碼為 plantarium2023（與Tinybook後台密碼不同）。"}, {"type": "single", "question": "租借流程步驟03是在哪裡確認發票開立與訂單狀態？", "options": ["Tinybook預定管理", "Excel場地租賃總表", "Tinybook訂單管理", "藍新金流後台"], "answer": 2, "explanation": "步驟03是在Tinybook後台的「訂單管理」確認發票開立、購買品項、訂單狀態，完成後點選更新。"}, {"type": "truefalse", "question": "發票已上傳且在當期申報期內，仍可以作廢並重開。", "answer": true, "explanation": "正確！發票已上傳但仍在當期申報截止日前，可以作廢並重新開立。超過截止日才必須用折讓單處理。"}, {"type": "single", "question": "藍新金流服務平台的公司統一編號是？", "options": ["94800552", "94174566", "plantarium2023", "01-預設公司"], "answer": 1, "explanation": "藍新金流服務平台的公司統一編號為94174566，與慈濟的統一編號94800552不同。"}, {"type": "single", "question": "租借流程步驟04是要做什麼？", "options": ["在Tinybook確認發票", "將訂單管理資料輸入至Excel", "確認客戶付款狀態", "發送確認email給客戶"], "answer": 1, "explanation": "步驟04是將訂單管理資料輸入至Excel（備註訂單相關資訊，供查帳使用）。"}, {"type": "truefalse", "question": "重新開立的發票，可以將日期填寫為原始發票的日期，方便對帳。", "answer": false, "explanation": "錯誤！新發票日期必須以重開當日為準，不可回填舊日期，這是國稅局規定。"}, {"type": "fill", "question": "客戶未收到發票時，應請客戶先確認是否收到寄件人含「____」的通知信。", "answer": "Ezpay-mainpage", "explanation": "發票通知信的寄件人會包含「Ezpay-mainpage」，請客戶先確認垃圾郵件/促銷信件分類。"}]}, {"id": "level_10", "title": "策展區爆音排除", "emoji": "🔊", "teaching": {"sections": [{"heading": "為什麼會爆音？", "content": "植境使用無線麥克風，若麥克風的頻道與周遭其他單位的設備頻道重疊，就會產生爆音（突然的雜音或噪音）。\\\\n\\\\n判斷方式：\\\\n① 麥克風出現突然的爆音、雜音\\\\n② 機櫃螢幕畫面中，左側訊號條持續或劇烈浮動"}, {"heading": "麥克風頻道結構說明", "content": "無線麥克風使用「Group-Channel」模式，顯示格式如：01-01\\\\n\\\\n- 左邊數字 = Group（群組）\\\\n  → 4支麥克風必須全部調整到相同的 Group 數字\\\\n- 右邊數字 = Channel（頻道）\\\\n  → Channel 可以調整\\\\n  → 原始設定：1號麥克風 = Channel 01\\\\n\\\\n當爆音發生，代表同一個 Channel 有其他人同時在使用，需要換到其他頻道（如02、11等）。"}, {"heading": "Channel 設定步驟", "content": "完整操作步驟：\\\\n① 按面板上的「SET」按鈕\\\\n② 旋轉右方黑色旋鈕，選到「GRP」或「CH」\\\\n③ 按一下黑色旋鈕的中間（畫面上數值開始跳動）\\\\n④ 轉動黑色旋鈕到適當的新數值\\\\n   ⚠️ 同時觀察左側訊號條，選擇幾乎不浮動或最多只亮一格的頻道\\\\n⑤ 選好數值後，再按一次黑色旋鈕的中間\\\\n⑥ 最後按「SET」完成設定\\\\n\\\\n簡記：SET → 選GRP/CH → 按中間 → 轉到適當數值 → 按中間 → SET"}, {"heading": "機櫃與麥克風同步", "content": "調整機櫃頻率後，必須讓麥克風同步到新頻率：\\\\n① 按下面板中間的「ACT」按鈕\\\\n② 將麥克風開機\\\\n③ 將麥克風下方的紅色圈圈對準黑色機櫃\\\\n④ 等待配對完成\\\\n→ 麥克風上的數字會跳動，並與機櫃顯示數字一致\\\\n→ 數字一致 = 配對成功、連線完成"}]}, "questions": [{"type": "single", "question": "策展區無線麥克風發生爆音的主要原因是什麼？", "options": ["麥克風電池沒電", "與其他單位的設備頻道重疊", "音量調太大", "HDMI線接觸不良"], "answer": 1, "explanation": "無線麥克風爆音是因為頻道與周遭其他單位設備的頻道重疊，解法是更換到其他較穩定的頻道。"}, {"type": "single", "question": "機櫃螢幕顯示「01-01」，其中第一個「01」代表什麼？", "options": ["Channel頻道", "Group群組", "麥克風編號", "音量等級"], "answer": 1, "explanation": "格式為 Group-Channel，左邊數字代表Group（群組），右邊數字代表Channel（頻道）。"}, {"type": "truefalse", "question": "4支麥克風的Group數字可以各自不同，Channel統一就好。", "answer": false, "explanation": "錯誤！4支麥克風必須全部調整到相同的Group數字，才能正常運作。"}, {"type": "single", "question": "調整頻道時，應該選擇訊號條狀態如何的頻道？", "options": ["訊號條全滿、劇烈浮動", "訊號條中等浮動", "幾乎不浮動或最多只亮一格", "完全沒有訊號條"], "answer": 2, "explanation": "應選擇左側訊號條幾乎不浮動，或最多只亮一格的頻道，表示該頻道目前較為穩定，沒有其他人使用。"}, {"type": "single", "question": "Channel設定的最後一步是什麼？", "options": ["按ACT按鈕", "拔掉電源重啟", "再按一次SET完成設定", "關閉麥克風"], "answer": 2, "explanation": "完整步驟：SET→選GRP/CH→按中間→轉數值→按中間→最後再按SET完成設定。"}, {"type": "multiple", "question": "機櫃與麥克風同步的步驟，以下哪些是正確的？（多選）", "options": ["先按面板的ACT按鈕", "將麥克風開機", "將麥克風紅色圈圈對準黑色機櫃", "等麥克風數字與機櫃數字一致即完成"], "answer": [0, 1, 2, 3], "explanation": "四個步驟全部正確：按ACT → 麥克風開機 → 紅色圈圈對準機櫃 → 等待數字一致即配對成功。"}, {"type": "fill", "question": "調整Channel設定時，要先按面板上的「____」按鈕才能開始操作。", "answer": "SET", "explanation": "開始調整Channel設定的第一步是按面板上的「SET」按鈕，然後才能旋轉旋鈕選擇GRP或CH。"}, {"type": "single", "question": "麥克風顯示「02-05」，代表Group是幾、Channel是幾？", "options": ["Group 5、Channel 2", "Group 2、Channel 5", "Group 02、Channel 05，無法分辨", "Group和Channel都是02-05"], "answer": 1, "explanation": "格式為Group-Channel，左邊數字是Group（02），右邊數字是Channel（05）。"}, {"type": "truefalse", "question": "調整Channel時，訊號條劇烈浮動代表這個頻道穩定，可以使用。", "answer": false, "explanation": "錯誤！訊號條劇烈浮動代表該頻道有其他人使用，不穩定，應選擇幾乎不浮動或最多只亮一格的頻道。"}, {"type": "fill", "question": "完成Channel設定後，要讓麥克風同步新頻率，需先按面板中間的「____」按鈕。", "answer": "ACT", "explanation": "調整機櫃頻率後，按ACT按鈕→麥克風開機→紅色圈圈對準機櫃→等數字一致即完成配對。"}, {"type": "single", "question": "無線麥克風配對成功的標誌是什麼？", "options": ["麥克風亮綠燈", "麥克風上的數字與機櫃顯示數字一致", "聽到「嗶」一聲", "訊號條變為全滿"], "answer": 1, "explanation": "麥克風上的數字跳動後，與機櫃顯示的數字一致，即代表配對成功、連線完成。"}, {"type": "truefalse", "question": "調整GRP時，只需要調整其中一支麥克風的Group，其他三支會自動同步。", "answer": false, "explanation": "錯誤！四支麥克風的Group必須各自手動調整到相同數字，不會自動同步。"}, {"type": "single", "question": "爆音發生時，機櫃螢幕畫面中哪個部分會持續或劇烈浮動？", "options": ["右側溫度條", "左側訊號條", "中間頻率顯示", "上方電量指示"], "answer": 1, "explanation": "判斷爆音發生的方式之一：機櫃螢幕畫面中，左側訊號條持續或劇烈浮動。"}, {"type": "fill", "question": "調整Channel設定時，轉動旋鈕後要按一次旋鈕中間，最後按____完成設定。", "answer": "SET", "explanation": "完整步驟：SET→選GRP/CH→按中間→轉數值→按中間→最後再按「SET」完成設定。"}, {"type": "truefalse", "question": "無線麥克風爆音的根本原因是麥克風電池電量不足。", "answer": false, "explanation": "錯誤！爆音是因為頻道與周遭其他單位設備的頻道重疊，需要換到其他頻道，與電池電量無關。"}]}, {"id": "level_11", "title": "會議室設備操作", "emoji": "🎯", "teaching": {"sections": [{"heading": "使用音效前：開啟三個設備", "content": "在使用任何音效功能前，必須依序開啟以下三個設備：\\\\n\\\\nStep.1：將開關從「O」切換至「I」符號\\\\nStep.2：按下紅圈圈內的按鈕（亮燈才代表已開啟）\\\\nStep.3：將紅圈內的開關從「OFF」切換至「ON」\\\\n\\\\n⚠️ 三個設備都要開，缺一不可。"}, {"heading": "音效調整（Step.4）", "content": "Step.4：調整音效大小，請從紅色方框內的旋鈕進行調整，調整到適合的音量。\\\\n\\\\n⚠️ 重要注意事項：\\\\n- 麥克風音量太大真的會爆音！\\\\n- 開啟或調整音量只有指定的幾個旋鈕，其餘按鍵請勿觸碰"}, {"heading": "常見問題排除", "content": "Q：音效設備都開了，為什麼沒聲音？\\\\nA：可能是麥克風電量不足，請至講台下方透明盒取電池更換，或請工作人員協助。\\\\n\\\\nQ：無法從電腦播放音效？\\\\nA：請檢查HDMI線是否接妥，或確認音源輸出設定是否正確。\\\\n\\\\nQ：麥克風出現雜音、有回音和嘯叫聲？\\\\nA：請調整音量旋鈕或更換電池，同時遠離其他干擾源。"}, {"heading": "其他設備", "content": "會議室備有以下三種遙控器：\\\\n- 投影機遙控器（控制投影機開關、設定）\\\\n- 投影幕遙控器（控制投影幕升降）\\\\n- 電風扇遙控器（控制電風扇）"}]}, "questions": [{"type": "single", "question": "使用會議室音效前，需要開啟幾個設備？", "options": ["1個", "2個", "3個", "4個"], "answer": 2, "explanation": "使用音效前，必須依序開啟三個設備：Step1（O切換至I）、Step2（按下亮燈按鈕）、Step3（OFF切換至ON）。"}, {"type": "single", "question": "Step.2的正確操作方式是什麼？", "options": ["將開關從OFF切換至ON", "按下紅圈圈內的按鈕，亮燈才是開", "將開關從O切換至I符號", "旋轉音量旋鈕"], "answer": 1, "explanation": "Step.2是按下紅圈圈內的按鈕，亮燈才代表已開啟。"}, {"type": "truefalse", "question": "調整會議室音量時，可以隨意操作音效設備上的任何按鍵。", "answer": false, "explanation": "錯誤！只有指定的幾個旋鈕可以操作，其餘按鍵請勿觸碰，以免造成設定異常。"}, {"type": "single", "question": "設備都已開啟但麥克風沒有聲音，最可能的原因是？", "options": ["投影機未開啟", "HDMI線未插", "麥克風電量不足", "電風扇干擾"], "answer": 2, "explanation": "設備都開了但沒聲音，最可能是麥克風電量不足，請至講台下方透明盒取電池更換。"}, {"type": "multiple", "question": "以下哪些是會議室備有的遙控器？（多選）", "options": ["投影機遙控器", "投影幕遙控器", "空調遙控器", "電風扇遙控器"], "answer": [0, 1, 3], "explanation": "會議室備有：投影機遙控器、投影幕遙控器、電風扇遙控器，共三種。空調另有系統控制。"}, {"type": "single", "question": "電腦無法播放音效至會議室喇叭時，應該先檢查什麼？", "options": ["麥克風電池", "HDMI線是否接妥及音源輸出設定", "投影幕是否降下", "電風扇是否關閉"], "answer": 1, "explanation": "無法從電腦播放音效時，應檢查HDMI線是否接妥，以及音源輸出設定是否正確。"}, {"type": "single", "question": "會議室音效Step.1的操作是什麼？", "options": ["按下紅圈圈內按鈕", "將開關從OFF切換至ON", "將開關從O切換至I符號", "調整音量旋鈕"], "answer": 2, "explanation": "Step.1是將開關從「O」切換至「I」符號，這是三個設備中的第一個。"}, {"type": "truefalse", "question": "會議室投影幕的升降是由投影機遙控器控制的。", "answer": false, "explanation": "錯誤！投影幕有專屬的投影幕遙控器控制升降，投影機遙控器是控制投影機的開關與設定。"}, {"type": "fill", "question": "會議室備有三種遙控器，分別是投影機遙控器、投影幕遙控器，以及____遙控器。", "answer": "電風扇", "explanation": "會議室三種遙控器：投影機遙控器、投影幕遙控器、電風扇遙控器。"}, {"type": "single", "question": "麥克風出現回音和嘯叫，除了調整音量外，還可以怎麼做？", "options": ["直接關掉麥克風電源", "更換電池並遠離其他干擾源", "重新開啟所有音效設備", "聯絡廠商立即維修"], "answer": 1, "explanation": "麥克風有雜音、回音或嘯叫聲，可調整音量旋鈕或更換電池，同時遠離其他干擾源。"}, {"type": "truefalse", "question": "使用會議室音效時，除了指定旋鈕外，其他按鍵也可以隨意嘗試看看效果。", "answer": false, "explanation": "錯誤！懶人包特別提醒，其餘按鍵請勿觸碰，只有指定的幾個旋鈕才能操作。"}, {"type": "single", "question": "會議室Step.3的操作是什麼？", "options": ["按下紅圈圈內按鈕亮燈", "將紅圈內開關從OFF切換至ON", "調整音量旋鈕", "將開關從O切換至I"], "answer": 1, "explanation": "Step.3是將紅圈內的開關從「OFF」切換至「ON」，三個設備都要開啟缺一不可。"}, {"type": "single", "question": "會議室Step.2的正確描述是？", "options": ["將O切換到I", "按紅圈圈按鈕，需確認燈有亮才算開啟", "將OFF切換到ON", "調整音量旋鈕至適當位置"], "answer": 1, "explanation": "Step.2是按下紅圈圈內的按鈕，需確認亮燈才代表已開啟，這是判斷是否成功的關鍵。"}, {"type": "fill", "question": "會議室使用音效前，必須依序開啟____個設備。", "answer": "3", "explanation": "必須依序開啟三個設備：Step1（O→I）、Step2（按鈕亮燈）、Step3（OFF→ON），缺一不可。"}, {"type": "truefalse", "question": "電腦無法播放音效時，應先確認電腦音源輸出選到的是外部裝置而非內建喇叭。", "answer": true, "explanation": "正確！電腦音效無法播放到會議室喇叭，首先確認音源輸出裝置選到外部裝置（非電腦內建喇叭）。"}]}, {"id": "level_12", "title": "綠牆維護管理", "emoji": "🌿", "teaching": {"sections": [{"heading": "廠商基本資訊", "content": "台灣綠牆開發股份有限公司\\\\n- 電話：(03)384-0018\\\\n- 地址：桃園市大園區聖德北路632-1號\\\\n- 工程名稱：慈濟東區B1植境－植生牆維護保養（114年度）"}, {"heading": "維護目的", "content": "植生牆是植境的門面，維護的三大目標：\\\\n① 外觀呈現綠意盎然的感覺\\\\n② 定期修剪雜草枯葉，幫助植物健康生長、維持牆面美觀\\\\n③ 讓每位來訪顧客感受到植物充足的生命力"}, {"heading": "工作項目", "content": "台灣綠牆開發公司負責的五大工作項目：\\\\n01 設備查修維護費\\\\n02 植栽維護費\\\\n03 道路管制申請文書作業費\\\\n04 高空作業車或吊車\\\\n05 工程管理費"}, {"heading": "施工注意事項", "content": "① 每2個月來館內進行一次植生牆維護\\\\n② 廠商會自行申請「路權」，將吊車停在松隆路上（不需要我們處理）\\\\n③ 廠商將發票寄來植境，由慈濟請款\\\\n   - 每月請款日：1日、16日\\\\n   - 付款方式：完工後每月請領100%，無保留款\\\\n④ 我方可多多關心工人，查看現場施工狀況"}]}, "questions": [{"type": "fill", "question": "台灣綠牆開發公司的聯絡電話是____。", "answer": "(03)384-0018", "explanation": "台灣綠牆開發股份有限公司電話為 (03)384-0018，地址在桃園市大園區聖德北路632-1號。"}, {"type": "single", "question": "植生牆維護廠商多久來館內進行一次維護？", "options": ["每個月", "每2個月", "每季（3個月）", "每半年"], "answer": 1, "explanation": "台灣綠牆開發公司每2個月來館內進行一次植生牆維護保養。"}, {"type": "truefalse", "question": "廠商施工時，吊車停放在松隆路的路權申請需要由我方植境來處理。", "answer": false, "explanation": "錯誤！廠商會自行申請路權，將吊車停在松隆路上，不需要我方處理。"}, {"type": "single", "question": "綠牆維護的每月請款日是哪兩天？", "options": ["5日、20日", "1日、16日", "10日、25日", "15日、30日"], "answer": 1, "explanation": "廠商將發票寄來植境由慈濟請款，每月請款日為1日和16日。"}, {"type": "multiple", "question": "台灣綠牆開發公司的工作項目包含哪些？（多選）", "options": ["設備查修維護費", "植栽維護費", "清潔人員費用", "高空作業車或吊車"], "answer": [0, 1, 3], "explanation": "工作項目為：設備查修維護費、植栽維護費、道路管制申請文書作業費、高空作業車或吊車、工程管理費。清潔人員費用不在其中。"}, {"type": "truefalse", "question": "綠牆維護的付款方式有保留款，完工後只能請領80%。", "answer": false, "explanation": "錯誤！付款方式為完工後每月請領100%，無保留款。"}, {"type": "single", "question": "植生牆施工時，若我方發現工程有疑慮，應該怎麼做？", "options": ["不干涉，全權交給廠商", "多多關心工人，查看現場施工狀況", "立即叫停工程等主管決定", "拍照後不處理"], "answer": 1, "explanation": "懶人包說明我方可多多關心工人，查看現場施工狀況，確保工程品質。"}, {"type": "single", "question": "植生牆維護的三大目標不包含以下哪項？", "options": ["外觀呈現綠意盎然", "定期修剪雜草枯葉", "讓顧客感受植物生命力", "廠商自行管理不需植境關心"], "answer": 3, "explanation": "懶人包說明我方可多多關心工人，查看現場施工狀況，並非完全不管。三大目標為外觀、修剪維護、顧客感受。"}, {"type": "truefalse", "question": "綠牆維護廠商施工時，路權申請及吊車停放均由廠商自行處理，植境不需介入。", "answer": true, "explanation": "正確！廠商會自行申請路權，將吊車停在松隆路上，不需要植境方面處理。"}, {"type": "single", "question": "台灣綠牆開發公司的工作項目中，「道路管制申請文書作業費」是第幾項？", "options": ["第1項", "第2項", "第3項", "第4項"], "answer": 2, "explanation": "五大工作項目依序：01設備查修維護費、02植栽維護費、03道路管制申請文書作業費、04高空作業車或吊車、05工程管理費。"}, {"type": "truefalse", "question": "綠牆維護完工後，廠商採月結方式請款，有保留10%款項直到驗收完成才付清。", "answer": false, "explanation": "錯誤！付款方式為完工後每月請領100%，無保留款。"}, {"type": "fill", "question": "綠牆維護工程名稱為「慈濟東區B1植境－植生牆維護保養（____年度）」。", "answer": "114", "explanation": "工程名稱為慈濟東區B1植境－植生牆維護保養（114年度），對應民國114年。"}, {"type": "single", "question": "植生牆維護的目標中，關於「修剪」的描述，以下哪項正確？", "options": ["只修剪超出牆面的部分", "定期修剪雜草枯葉，幫助植物健康生長並維持牆面美觀", "每週修剪一次確保整齊", "不需要修剪，植物自然生長就好"], "answer": 1, "explanation": "維護目標之一為定期修剪雜草枯葉，幫助植物健康生長、維持牆面美觀。"}, {"type": "truefalse", "question": "台灣綠牆開發公司的工作項目共有五大項。", "answer": true, "explanation": "正確！五大工作項目：01設備查修維護費、02植栽維護費、03道路管制申請文書作業費、04高空作業車或吊車、05工程管理費。"}, {"type": "fill", "question": "綠牆維護廠商每____個月來館內進行一次植生牆維護。", "answer": "2", "explanation": "台灣綠牆開發公司每2個月來館內進行一次植生牆維護保養。"}]}, {"id": "level_13", "title": "颱風天應變流程", "emoji": "🌀", "teaching": {"sections": [{"heading": "訊息公告—內部通知", "content": "情況一：颱風靠近台灣（尚未確定停班停課）\\\\n→ 在各個群組公告提醒大家注意安全，提醒重點：\\\\n① 上班注意安全，雨天道路濕滑，注意交通狀況\\\\n② 出門記得攜帶雨具，提早出門預留通勤時間\\\\n③ 店面營運與進貨時，特別留意側門進貨斜坡，防止雨天打滑或搬運不慎\\\\n\\\\n情況二：颱風確認會進台灣，且可能停班停課\\\\n→ 公告「植境將依政府停班停課公告進行營運調整」\\\\n→ 同步暫停營業與空間使用\\\\n→ 提醒各單位收貨如需調整請早評估，若非必要，請勿在風雨高峰時段進出館內"}, {"heading": "訊息公告—外部公告", "content": "確認停班停課後，需在官方 IG 和 FB 發布停業公告。\\\\n\\\\n公告內容要點：\\\\n- 說明因颱風來襲，為顧及顧客及員工安全\\\\n- 公告暫停營業的日期\\\\n- 請民眾颱風期間減少外出，注意自身安全"}, {"heading": "環境保護—事前作業", "content": "【防水沙包】\\\\n- 沙包放置在辦公室的倉庫內（共兩箱）\\\\n- 放置方式：以「磚牆形」方式放置在大門外\\\\n  → 上下排沙包以重疊1/3的面積向上堆疊\\\\n\\\\n【植物保護】\\\\n- 將樓梯上的所有植物移至室內遮蔽處擺放（避免被風雨損傷）"}, {"heading": "災後清潔維護", "content": "颱風過後，依序完成以下事項：\\\\n① 環境巡邏\\\\n② 電源檢查\\\\n③ 請各單位自行檢查自家環境並回報狀況給我們\\\\n④ 環境清潔\\\\n⑤ 植物放回原位\\\\n⑥ 收沙包並曬乾清潔\\\\n\\\\n⚠️ 環境、電源等有任何問題，第一時間回報！！！！"}]}, "questions": [{"type": "single", "question": "颱風靠近但尚未確定停班停課時，行政人員應該怎麼做？", "options": ["等確定停班再通知", "在各群組公告提醒大家注意安全", "直接在IG發停業公告", "不需要做任何動作"], "answer": 1, "explanation": "颱風靠近時，應先在各個群組公告提醒大家注意安全，包含交通、攜帶雨具、進貨斜坡注意事項等。"}, {"type": "single", "question": "確認停班停課後，植境對外的停業公告應發布在哪些平台？", "options": ["只發LINE群組", "只發官方IG", "官方IG和FB", "官方網站和Email"], "answer": 2, "explanation": "確認停班停課後，需在官方IG和FB兩個平台發布停業公告，讓顧客知道暫停營業資訊。"}, {"type": "single", "question": "防水沙包應以什麼方式放置在大門外？", "options": ["隨意堆疊即可", "一字排列", "磚牆形（上下排以重疊1/3面積堆疊）", "金字塔形"], "answer": 2, "explanation": "沙包應以磚牆形方式放置，即上下排沙包以重疊1/3的面積向上堆疊，這樣才能有效阻擋雨水。"}, {"type": "fill", "question": "防水沙包放置在辦公室的____內，共有兩箱。", "answer": "倉庫", "explanation": "防水沙包平時存放在辦公室的倉庫內，颱風來臨前取出放置在大門外。"}, {"type": "truefalse", "question": "颱風期間，樓梯上的植物不需要特別移動，可以留在原地。", "answer": false, "explanation": "錯誤！颱風前需要將樓梯上的所有植物移至室內遮蔽處擺放，避免被強風豪雨損傷。"}, {"type": "multiple", "question": "颱風過後，災後清潔維護需要完成哪些事項？（多選）", "options": ["環境巡邏", "電源檢查", "植物放回原位", "收沙包並曬乾清潔"], "answer": [0, 1, 2, 3], "explanation": "四項全部正確，災後依序完成：環境巡邏→電源檢查→各單位回報→環境清潔→植物放回原位→收沙包曬乾清潔。"}, {"type": "truefalse", "question": "颱風期間若非必要，工作人員應避免在風雨高峰時段進出館內，以人身安全為優先。", "answer": true, "explanation": "正確！公告中特別強調若非必要，請勿在風雨高峰時段進出館內，人身安全為最優先考量。"}, {"type": "single", "question": "颱風天進貨時，特別需要留意哪個地點的安全？", "options": ["電梯入口", "側門進貨斜坡", "館內走廊", "停車場"], "answer": 1, "explanation": "颱風天提醒重點之一是特別留意側門進貨斜坡，防止雨天打滑或搬運不慎造成意外。"}, {"type": "truefalse", "question": "颱風停班前，外部公告只需在FB發布，IG不需要同步更新。", "answer": false, "explanation": "錯誤！確認停班停課後，需在官方IG和FB兩個平台都發布停業公告。"}, {"type": "fill", "question": "颱風過後災後處理，依序是環境巡邏→電源檢查→各單位回報→環境清潔→植物放回原位→____並曬乾清潔。", "answer": "收沙包", "explanation": "颱風後完整流程末項為收回沙包並曬乾清潔，避免沙包受潮或發霉。"}, {"type": "single", "question": "颱風確認會進台灣且可能停班時，植境的應對是什麼？", "options": ["照常營業直到政府公告", "先暫停進貨但繼續營業", "依政府公告調整，同步暫停營業與空間使用", "等主管個別通知各單位"], "answer": 2, "explanation": "應公告「植境將依政府停班停課公告進行營運調整」，並同步暫停營業與空間使用。"}, {"type": "truefalse", "question": "沙包放置方式採金字塔形堆疊，這樣最穩固。", "answer": false, "explanation": "錯誤！沙包應以「磚牆形」方式放置，上下排沙包以重疊1/3面積向上堆疊，不是金字塔形。"}, {"type": "single", "question": "颱風天內部通知提醒的重點不包含以下哪項？", "options": ["雨天道路濕滑注意交通", "攜帶雨具提早出門", "側門進貨斜坡注意打滑", "館內所有設備需斷電"], "answer": 3, "explanation": "內部通知重點為：注意交通安全、攜帶雨具提早出門、留意側門進貨斜坡。館內設備斷電不在通知重點內。"}, {"type": "fill", "question": "颱風前，樓梯上的植物需移至室內____處擺放，避免被風雨損傷。", "answer": "遮蔽", "explanation": "颱風前需將樓梯上所有植物移至室內遮蔽處擺放，保護植物不受強風豪雨損傷。"}, {"type": "truefalse", "question": "颱風過後，環境或電源有任何問題都需要第一時間回報。", "answer": true, "explanation": "正確！颱風後懶人包特別強調，環境、電源等有任何問題，第一時間回報！！！！"}]}, {"id": "level_14", "title": "館內機電維護", "emoji": "⚡", "teaching": {"sections": [{"heading": "廠商資訊：中澤工程", "content": "公司名稱：中澤工程\\\\n聯絡電話：(02)87918638\\\\n巡查週期：一個月一次檢測修繕\\\\n\\\\n服務範圍：\\\\n- 館內電力設施及公區照明檢測\\\\n- 受信總機檢測\\\\n- 緊急廣播檢測\\\\n- 配電室檢測\\\\n- 廁所的電力設施修繕\\\\n- 排水檢測\\\\n- 戶外排水系統檢測"}, {"heading": "修繕處理七步驟", "content": "發現問題到結案的完整流程：\\\\n① 我發現\\\\n② 拍照（記錄現況）\\\\n③ 告知主管\\\\n④ 填寫通報表單\\\\n⑤ 廠商修繕\\\\n⑥ 驗收（修繕人員需請現場值班人員陪同驗收並簽名確認）\\\\n⑦ 結案紀錄"}, {"heading": "常見問題處理方式", "content": "Q：什麼情況算緊急？\\\\nA：涉及顧客人身安全、設備冒煙跳電等，立即通報並同步通知主管。\\\\n\\\\nQ：冷氣出風口漏水，要聯絡誰？\\\\nA：拍照後通知主管，由主管聯繫中澤工程修繕單位。\\\\n\\\\nQ：廠商修好後，我要做什麼？\\\\nA：請修繕人員在現場，找值班人員一起陪同驗收並簽名確認。\\\\n\\\\nQ：週末沒人處理怎麼辦？\\\\nA：如遇緊急（如跳電、全館斷水），同步通知主管和修繕廠商。"}, {"heading": "報修常見NG（錯誤行為）", "content": "以下三種是最常見的報修錯誤，請務必避免：\\\\n① 沒拍照就報修\\\\n② 地點描述過於模糊\\\\n③ 忘記記錄是否已完成修繕"}]}, "questions": [{"type": "fill", "question": "中澤工程的聯絡電話是____。", "answer": "(02)87918638", "explanation": "中澤工程是植境館內機電維護的保護廠商，聯絡電話為 (02)87918638。"}, {"type": "single", "question": "中澤工程多久來館內巡查一次？", "options": ["每週一次", "每兩週一次", "每個月一次", "每季一次"], "answer": 2, "explanation": "中澤工程的巡查週期為一個月一次檢測修繕。"}, {"type": "single", "question": "發現設備問題後，修繕流程的第二步是什麼？", "options": ["直接打電話給廠商", "拍照記錄現況", "填寫通報表單", "等主管發現"], "answer": 1, "explanation": "完整流程為：發現→拍照→告知主管→通報表單→廠商修繕→驗收→結案。第二步是拍照。"}, {"type": "single", "question": "廠商修繕完畢後，驗收時誰需要陪同並簽名確認？", "options": ["主管親自到場", "現場值班人員", "清潔阿姨", "顧客代表"], "answer": 1, "explanation": "廠商修好後，修繕人員應請現場值班人員陪同驗收並簽名確認，這是驗收的標準程序。"}, {"type": "multiple", "question": "以下哪些屬於「報修常見NG」的錯誤？（多選）", "options": ["沒拍照就報修", "地點描述過於模糊", "立即通知主管", "忘記記錄是否完成修繕"], "answer": [0, 1, 3], "explanation": "三大常見NG：沒拍照就報修、地點描述模糊、忘記記錄是否完成。立即通知主管是正確做法，不是NG。"}, {"type": "truefalse", "question": "週末遇到全館跳電，可以等到週一上班再處理，不需要緊急聯絡。", "answer": false, "explanation": "錯誤！如遇緊急情況（如跳電、全館斷水），即使是週末也要同步通知主管和修繕廠商，不能等到週一。"}, {"type": "single", "question": "中澤工程的服務範圍不包含以下哪項？", "options": ["館內電力設施及公區照明檢測", "廁所電力設施修繕", "植生牆維護", "排水檢測"], "answer": 2, "explanation": "植生牆維護由台灣綠牆開發公司負責，不在中澤工程的服務範圍內。"}, {"type": "truefalse", "question": "報修時，只要用LINE傳訊息給主管說明問題，就算完成報修流程。", "answer": false, "explanation": "錯誤！完整報修流程為：發現→拍照→告知主管→填寫通報表單→廠商修繕→驗收→結案，缺一不可。"}, {"type": "fill", "question": "報修流程共有____個步驟，最後一步是結案紀錄。", "answer": "7", "explanation": "七個步驟：①發現②拍照③告知主管④通報表單⑤廠商修繕⑥驗收⑦結案紀錄。"}, {"type": "single", "question": "以下哪種情況屬於「緊急」情況，需立即通報？", "options": ["廁所衛生紙用完", "冷氣出風口有灰塵", "設備冒煙跳電", "地板有輕微刮痕"], "answer": 2, "explanation": "涉及顧客人身安全、設備冒煙跳電等情況屬緊急，需立即通報並同步通知主管。"}, {"type": "truefalse", "question": "廠商修好設備後，行政人員可以自行在系統上結案，不需要陪同驗收。", "answer": false, "explanation": "錯誤！廠商修繕完畢後，修繕人員需請現場值班人員「陪同驗收並簽名確認」，這是必要程序。"}, {"type": "single", "question": "報修時「地點描述過於模糊」是常見NG之一，以下哪個描述最正確？", "options": ["廁所壞了", "B1女廁第二間馬桶堵塞", "樓上有問題", "那個地方有狀況"], "answer": 1, "explanation": "地點描述應具體，如「B1女廁第二間馬桶堵塞」，才能讓廠商快速定位問題。"}, {"type": "single", "question": "中澤工程服務範圍中，「緊急廣播檢測」屬於哪個類別？", "options": ["電力設施", "排水系統", "受信總機相關", "廁所設施"], "answer": 2, "explanation": "中澤工程服務範圍包含：館內電力設施、受信總機檢測、緊急廣播檢測、配電室檢測、廁所電力修繕、排水及戶外排水檢測。"}, {"type": "truefalse", "question": "冷氣出風口漏水時，行政人員可以自行判斷原因並嘗試修復。", "answer": false, "explanation": "錯誤！冷氣出風口漏水應先拍照，再通知主管，由主管聯繫中澤工程修繕，不可自行處理。"}, {"type": "fill", "question": "報修三大NG行為：沒拍照就報修、地點描述過於____、忘記記錄是否完成修繕。", "answer": "模糊", "explanation": "三大常見報修NG：①沒拍照就報修②地點描述過於模糊③忘記記錄是否已完成修繕。"}]}, {"id": "level_15", "title": "館內公播音樂管理", "emoji": "🎵", "teaching": {"sections": [{"heading": "公播系統基本說明", "content": "館內音樂使用公播系統，透過平板控制。\\\\n\\\\n平板位置：冷水開關機房內的長櫃最底層\\\\n\\\\n公播系統主要功能：\\\\n① 新增現有音樂或排程播放\\\\n② 調整音樂音量\\\\n③ 管理播放排程"}, {"heading": "音量與排程管理", "content": "【音量調整】\\\\n通常不在平板畫面上設置，而是在音響機櫃上的指定區域旋鈕，直接轉大或轉小聲。\\\\n\\\\n【排程管理】\\\\n館內音樂播放有誤時，請先檢查排程是否有開啟。\\\\n也可以複製現有排程再次播放試聽。"}, {"heading": "使用者規範與注意事項", "content": "① 勿擅自移動平板，請保持電量充足\\\\n② 音量應顧及館內顧客感受，建議調整後再次確認音量是否適當\\\\n③ 若非植境行政人員，請勿調整排程設定\\\\n④ 未來需替換音樂，請確認是否為MP3檔案格式\\\\n⑤ 新增音樂請聯絡公司業務，由他們上傳音樂至系統雲端（不可自行上傳）"}]}, "questions": [{"type": "fill", "question": "館內公播系統的控制平板放置在____內的長櫃最底層。", "answer": "冷水開關機房", "explanation": "公播系統的平板位置在冷水開關機房內的長櫃最底層，使用前需前往該處取用。"}, {"type": "single", "question": "館內音樂播放有誤時，第一步應該檢查什麼？", "options": ["重啟平板", "檢查排程是否有開啟", "更換音樂檔案", "聯絡廠商"], "answer": 1, "explanation": "館內音樂播放有誤時，應先檢查排程是否有開啟，也可以複製現有排程再次播放試聽。"}, {"type": "truefalse", "question": "任何同仁都可以調整公播系統的排程設定。", "answer": false, "explanation": "錯誤！排程設定只有植境行政人員才可以調整，其他同仁請勿更改排程。"}, {"type": "single", "question": "如果需要新增音樂到公播系統，應該怎麼做？", "options": ["自行用USB上傳", "聯絡公司業務，由他們上傳至系統雲端", "直接複製到平板", "發Email給IT部門"], "answer": 1, "explanation": "新增音樂需聯絡公司業務，由他們將音樂上傳至系統雲端，不可自行上傳。"}, {"type": "single", "question": "若需要替換館內公播音樂，音樂檔案需要是什麼格式？", "options": ["AAC", "WAV", "MP3", "FLAC"], "answer": 2, "explanation": "替換音樂時，請確認音樂檔案為MP3格式，其他格式可能不相容。"}, {"type": "truefalse", "question": "公播平板可以隨時移動位置，方便操作即可。", "answer": false, "explanation": "錯誤！規定勿擅自移動平板，應保持平板在原位並維持電量充足。"}, {"type": "single", "question": "音量要調整大小，應在哪裡操作？", "options": ["平板控制介面上", "音響機櫃上的指定旋鈕", "電腦音效設定", "直接用平板左右滑動"], "answer": 1, "explanation": "音量通常不在平板畫面設置，而是在音響機櫃上的指定區域旋鈕直接轉大或轉小。"}, {"type": "truefalse", "question": "如果需要替換館內音樂，可以自行用USB隨身碟上傳到平板。", "answer": false, "explanation": "錯誤！新增或替換音樂需聯絡公司業務，由他們上傳至系統雲端，不可自行上傳。"}, {"type": "fill", "question": "館內公播音樂若播放有誤，應先檢查____是否有開啟。", "answer": "排程", "explanation": "館內音樂播放有誤時，第一步是先檢查排程是否有開啟，也可以複製現有排程再次播放試聽。"}, {"type": "single", "question": "公播系統替換音樂時，需要確認音樂檔案格式為？", "options": ["AAC", "WAV", "MP3", "FLAC"], "answer": 2, "explanation": "替換音樂請確認為MP3檔案格式，其他格式可能不相容。"}, {"type": "truefalse", "question": "公播平板可以隨意移動到任何地方使用，只要有充電就好。", "answer": false, "explanation": "錯誤！規定勿擅自移動平板，應保持平板在原位（冷水開關機房長櫃最底層）並維持電量充足。"}, {"type": "single", "question": "以下哪位同仁可以調整公播排程設定？", "options": ["所有植境同仁", "只有值班主管", "植境行政人員", "只有廠商業務"], "answer": 2, "explanation": "排程設定只有植境行政人員才可以調整，非行政人員請勿更改排程設定。"}, {"type": "single", "question": "公播系統可以執行哪些主要功能？", "options": ["新增音樂、調整音量、管理排程", "錄製現場聲音、播放音樂、視訊會議", "調整空調、播放音樂、燈光控制", "只能播放預設音樂，無法調整"], "answer": 0, "explanation": "公播系統三大功能：①新增現有音樂或排程播放②調整音樂音量③管理播放排程。"}, {"type": "fill", "question": "公播系統的控制平板放置在冷水開關機房內的長櫃____層。", "answer": "最底", "explanation": "公播系統平板位置在冷水開關機房內的長櫃最底層。"}, {"type": "truefalse", "question": "音量調整後，建議再次確認音量是否適當，以顧及館內顧客感受。", "answer": true, "explanation": "正確！調整音量後應再次確認音量是否適當，音量標準是以顧及館內顧客感受為主。"}]}, {"id": "level_16", "title": "HR加班與排班流程", "emoji": "📅", "teaching": {"sections": [{"heading": "加班申請四步驟", "content": "① 系統登入：使用個人帳號密碼登入HR系統\\\\n② 預定加班申請：到「預先加班系統」（B3.1預定加班申請）填寫加班日期、時間及原因\\\\n③ 加班日：依加班時段完成系統上下班打卡\\\\n④ 實際加班單：加班後到「實際加班單系統」（B3.2實際加班單）填寫相關單據，完成申請"}, {"heading": "加班報備注意事項", "content": "⚠️ 事前申請原則：\\\\n加班須在開始加班前30分鐘～1小時完成系統報備\\\\n未事前報備的加班，原則上不計入有效工時\\\\n\\\\n緊急加班（臨時必須加班）：\\\\n需於隔日補齊申請，並附上主管說明\\\\n\\\\n系統故障應變：\\\\n系統無法使用或忘記申請時，請值班主管幫忙協助"}, {"heading": "出國報備流程", "content": "① 提前通知：至少於出發前14個工作日完成系統報備\\\\n   （較長期出國規劃，請提早2~3個月）\\\\n② 知會主管：向直屬主管說明出國原因及時間\\\\n③ 團隊交接：安排工作交接，確保期間業務正常運作\\\\n④ 行程確認：至 Google 日曆確認排休日期與出國行程是否符合，有誤立即向直系主管反應"}, {"heading": "國定假日排班與排班變更", "content": "【國定假日排班原則】\\\\n- 公平均衡原則：確保工作負擔平均分配\\\\n- 提前排休：請於公布下月值班表前7個工作天向主管說明\\\\n- 可提早與夥伴協商，每次輪流休；如希望排班（不休）也可提出\\\\n\\\\n【排班變更申請】\\\\n① 取得部門主管同意並更新系統資料，變更需在原排班前7日完成\\\\n② 透過系統填寫請假單，說明原因及日期\\\\n③ 請主管核實"}]}, "questions": [{"type": "single", "question": "加班申請的第一步是什麼？", "options": ["先完成加班再申請", "使用個人帳號密碼登入HR系統", "打電話告知主管", "在群組留言說要加班"], "answer": 1, "explanation": "加班申請第一步是使用個人帳號密碼登入HR系統，然後才進行後續預定加班申請等步驟。"}, {"type": "single", "question": "加班申請的系統報備，最晚應在開始加班前多久完成？", "options": ["10分鐘前", "30分鐘～1小時前", "2小時前", "前一天"], "answer": 1, "explanation": "加班須在開始加班前30分鐘～1小時完成系統報備，否則未報備的工時原則上不予認可。"}, {"type": "truefalse", "question": "沒有事前報備的加班，只要加班完後補填，工時就可以計入。", "answer": false, "explanation": "錯誤！未事前報備的加班原則上不計入有效工時。緊急加班需隔日補申請並附上主管說明，一般情況必須事前申請。"}, {"type": "fill", "question": "出國報備至少需要在出發前____個工作日完成系統報備。", "answer": "14", "explanation": "出國需至少提前14個工作日完成系統報備，若是較長期出國規劃，更建議提早2~3個月告知。"}, {"type": "single", "question": "排班變更申請（如請假），最晚需要在原排班前幾日完成？", "options": ["3日", "5日", "7日", "14日"], "answer": 2, "explanation": "排班變更需於原排班前七日完成，需取得主管同意並填寫HR系統請假單。"}, {"type": "single", "question": "如果忘記出國報備，應該怎麼補救？", "options": ["直接出國，回來再說", "立即通知直屬主管及人資部門，補填報備單並說明原因", "只傳訊息給主管即可", "請同事代為填寫"], "answer": 1, "explanation": "忘記出國報備時，應立即通知直屬主管及人資部門，補填報備單並說明原因。"}, {"type": "truefalse", "question": "國定假日希望排班上班（不休）的同仁，可以主動提出申請。", "answer": true, "explanation": "正確！懶人包特別說明「如希望排班者，也可以提出」，員工可以主動表達希望在國定假日排班上班。"}, {"type": "single", "question": "加班申請的第三步驟是什麼？", "options": ["填寫實際加班單", "登入HR系統", "加班日依加班時段完成系統上下班打卡", "填寫預定加班申請"], "answer": 2, "explanation": "四步驟：①登入HR系統→②填預定加班申請→③加班日完成打卡→④填實際加班單，第三步是打卡。"}, {"type": "truefalse", "question": "長期出國規劃（如一個月以上），只需要提前14個工作日報備即可。", "answer": false, "explanation": "錯誤！較長期的出國規劃，建議提早2~3個月告知，14個工作日是一般短期出國的最低要求。"}, {"type": "fill", "question": "加班申請系統中，填寫預定加班的入口是「B____預定加班申請」。", "answer": "3.1", "explanation": "預定加班的系統入口為B3.1預定加班申請，實際加班單則是B3.2。"}, {"type": "single", "question": "系統故障無法填加班申請時，應怎麼處理？", "options": ["當天不算加班", "隔天自行補填即可", "請值班主管協助", "等系統恢復再說"], "answer": 2, "explanation": "系統無法使用或忘記申請時，請值班主管幫忙協助處理。"}, {"type": "truefalse", "question": "國定假日的排班，採公平均衡原則，確保工作負擔平均分配。", "answer": true, "explanation": "正確！國定假日排班採公平均衡原則，確保每位同仁的工作負擔平均分配。"}, {"type": "single", "question": "加班後需填寫「實際加班單」，其系統入口為？", "options": ["B3.1", "B3.2", "B2.1", "HR首頁"], "answer": 1, "explanation": "實際加班單的系統入口為B3.2，預定加班申請才是B3.1。"}, {"type": "truefalse", "question": "出國知會主管後，也需要安排工作交接，確保期間業務正常運作。", "answer": true, "explanation": "正確！出國流程包含：提前報備、知會主管、安排工作交接、確認Google日曆排休日期，四步驟缺一不可。"}, {"type": "fill", "question": "排班變更申請，需於原排班前____日完成，並需取得部門主管同意。", "answer": "7", "explanation": "排班變更需於原排班前七日完成，透過系統填寫請假單，並請主管核實。"}]}, {"id": "level_17", "title": "慈濟基金會請款流程", "emoji": "💰", "teaching": {"sections": [{"heading": "發票開立規定", "content": "請款時，發票開立需符合以下規定：\\\\n\\\\n手開發票：需要有本會抬頭、統一編號及品項明細\\\\n電子收銀機發票：需載明統一編號 94800552\\\\n\\\\n抬頭：財團法人中華民國佛教慈濟慈善事業基金會"}, {"heading": "製作EXCEL請款明細表", "content": "依據單據數量決定作業方式：\\\\n\\\\n5張單據以內：掃描PDF收據放附件即可，不需要附EXCEL\\\\n10張單據以上：附上EXCEL明細表即可，免掃描收據\\\\n\\\\n注意事項：\\\\n- 用途須完整填寫，以利主管了解\\\\n- 類型要區分清楚"}, {"heading": "填寫請款單（Notes系統）", "content": "請款單種類說明：\\\\n\\\\n【簽呈 vs 非簽呈】\\\\n- 簽呈請款單：需附上主管通過的簽呈序號\\\\n\\\\n【一般請款單 vs 勞務請款單】\\\\n- 勞務請款單：用於支付個人所得，如講師費、工讀生薪資、翻譯費等\\\\n- 其餘費用：使用一般請款單\\\\n\\\\n【廠商付款前置作業】\\\\n- 先至廠商申請查詢，確認廠商是否已登入系統\\\\n- 若無，需上傳廠商資料以利匯款\\\\n- 支付個人費用：至「廠商新增」申請勞務廠商，需上傳身分證及勞務簽領單"}, {"heading": "請款單填寫注意事項", "content": "主旨規定：不超過25字\\\\n範例：「植境公帳卡金額核銷及撥補，誠請主管核示。」\\\\n\\\\n說明：請以列點式說明（條列清楚）\\\\n\\\\n預算科目選擇：依照各類別選擇對應科目\\\\n範例：「公關品」→選擇「其他社會福利」\\\\n\\\\n公帳卡核銷專用：\\\\n廠商名稱搜尋「行政公卡-執辦台北東區會所(植境)」，憑證種類選收據\\\\n\\\\n送出前確認：廠商資料的憑證金額須與預算資料的金額相符，並附上購買憑證（發票/收據）、EXCEL明細表等相關文件。"}, {"heading": "付款時程", "content": "一般款項：每月15日及月底付款\\\\n工程款：每月10日及25日付款\\\\n\\\\n⚠️ 請於付款日前15天完成請款並由主管簽核\\\\n\\\\n匯費說明：廠商匯款會扣30元匯費\\\\n→ 若要幫廠商支付匯費，請在說明欄位註明「不扣匯費」\\\\n→ 否則廠商收到的款項將少30元"}]}, "questions": [{"type": "fill", "question": "電子收銀機發票需載明慈濟的統一編號____。", "answer": "94800552", "explanation": "電子收銀機發票需載明慈濟的統一編號94800552，手開發票則需要有本會抬頭、統一編號及明細。"}, {"type": "single", "question": "若有12張收據需要請款，應該如何處理？", "options": ["全部掃描PDF附件，不需要EXCEL", "附上EXCEL明細表即可，不需掃描收據", "全部收據都需要掃描AND附EXCEL", "12張以上不能請款，需拆成兩次"], "answer": 1, "explanation": "10張單據以上：附上EXCEL明細表即可，免掃描收據。5張以內才是掃描PDF附件即可。"}, {"type": "single", "question": "支付工讀生薪資應使用哪種請款單？", "options": ["一般請款單", "勞務請款單", "簽呈請款單", "公帳卡核銷"], "answer": 1, "explanation": "勞務請款單用於支付個人所得，包含講師費、工讀生薪資、翻譯費等，其餘費用使用一般請款單。"}, {"type": "truefalse", "question": "請款單的主旨最多可以寫到50個字。", "answer": false, "explanation": "錯誤！請款單主旨不超過25字，例如「植境公帳卡金額核銷及撥補，誠請主管核示。」"}, {"type": "single", "question": "廠商匯款時，若不希望廠商被扣匯費，應在哪裡特別說明？", "options": ["直接打電話告知廠商", "在請款單說明欄位註明「不扣匯費」", "在EXCEL明細表備注", "傳LINE給主管提醒"], "answer": 1, "explanation": "廠商匯款會自動扣30元匯費，若要幫廠商支付，需在請款單說明處特別註明「不扣匯費」。"}, {"type": "single", "question": "一般款項的付款日為何？若15號付款，最晚需幾日前完成請款並簽核？", "options": ["10日前（付款前5天）", "1日前（付款前14天）", "須付款日前15天完成請款並由主管簽核", "當天送出即可"], "answer": 2, "explanation": "請於付款日前15天完成請款並由主管簽核完成，才能趕上當期付款作業。"}, {"type": "single", "question": "「公關品」這類費用應選擇哪個預算科目？", "options": ["行政費用", "採購費用", "其他社會福利", "公關活動費"], "answer": 2, "explanation": "依照懶人包範例，「公關品」類別對應的預算科目應選擇「其他社會福利」。"}, {"type": "fill", "question": "工程款的付款日期為每月____日及____日。（請用斜線分隔，如：1/16）", "answer": "10/25", "explanation": "工程款每月10日及25日付款，一般款項則是每月15日及月底付款，兩者不同請注意區分。"}, {"type": "single", "question": "請款單說明欄位應以什麼方式填寫？", "options": ["流水帳方式", "列點式（條列清楚）", "純文字段落", "表格形式"], "answer": 1, "explanation": "請款單說明欄位請以列點式說明，條列清楚，方便主管審核。"}, {"type": "truefalse", "question": "廠商匯款預設會扣除30元匯費，若不希望扣除，需在說明欄填寫「不扣匯費」。", "answer": true, "explanation": "正確！廠商匯款會自動扣30元匯費，若要幫廠商負擔這筆費用，需在說明欄特別註明「不扣匯費」。"}, {"type": "fill", "question": "請款單主旨不超過____字。", "answer": "25", "explanation": "請款單主旨規定不超過25字，例如「植境公帳卡金額核銷及撥補，誠請主管核示。」"}, {"type": "single", "question": "公帳卡核銷時，廠商名稱應搜尋什麼？", "options": ["慈濟東區會所", "植境行政公卡", "行政公卡-執辦台北東區會所(植境)", "plantarium公務卡"], "answer": 2, "explanation": "公帳卡核銷時，廠商名稱搜尋「行政公卡-執辦台北東區會所(植境)」，憑證種類選收據。"}, {"type": "truefalse", "question": "5張收據以內，只需掃描PDF收據附上即可，不需要另外製作EXCEL明細表。", "answer": true, "explanation": "正確！5張單據以內掃描PDF收據放附件即可，不需要附EXCEL；10張以上才需要EXCEL明細表。"}, {"type": "fill", "question": "慈濟的統一編號是____，需載明於電子收銀機發票上。", "answer": "94800552", "explanation": "電子收銀機發票需載明慈濟統一編號94800552，手開發票需有本會抬頭、統一編號及品項明細。"}, {"type": "truefalse", "question": "勞務請款單用於支付翻譯費、講師費等個人所得，一般採購費用使用一般請款單。", "answer": true, "explanation": "正確！勞務請款單用於個人所得（講師費、工讀生薪資、翻譯費等），其餘費用使用一般請款單。"}]}, {"id": "level_18", "title": "服務鈴（求救鈴）應對", "emoji": "🔔", "teaching": {"sections": [{"heading": "服務鈴分佈區域", "content": "B1共設有4處求救鈴，位置如下：\\\\n① B1 無障礙廁所\\\\n② B1 男廁\\\\n③ B1 客梯旁女廁（設有2處）\\\\n\\\\n⚠️ 求救鈴僅供緊急使用，如身體不適、意外發生時按壓，不得隨意觸碰。"}, {"heading": "緊急鈴應對SOP（三步驟）", "content": "當求救鈴響起時，依序執行：\\\\n\\\\nStep 1：迅速至服務台確認準確位置並解除警報\\\\n→ 警報解除裝置位置：北市圖的桌子下方\\\\n\\\\nStep 2：立即前往該發生位置\\\\n\\\\nStep 3：簡單詢問當事人狀況，視情況通報醫護或保全\\\\n\\\\n⚠️ 如需通報醫護，請撥打119，並主動告知當天主管事情經過。"}]}, "questions": [{"type": "single", "question": "B1共有幾處求救鈴？", "options": ["2處", "3處", "4處", "5處"], "answer": 2, "explanation": "B1共設有4處求救鈴：無障礙廁所1處、男廁1處、客梯旁女廁2處，共4處。"}, {"type": "single", "question": "求救鈴響起時，第一步應該做什麼？", "options": ["立即撥打119", "先跑去事發現場", "迅速至服務台確認位置並解除警報", "通知主管後再行動"], "answer": 2, "explanation": "Step1是迅速至服務台確認準確位置並解除警報，警報解除裝置在北市圖的桌子下方。"}, {"type": "fill", "question": "求救鈴警報解除裝置位於____的桌子下方。", "answer": "北市圖", "explanation": "警報解除裝置位置在北市圖（北市圖書館）的桌子下方，緊急時需前往該處解除警報。"}, {"type": "truefalse", "question": "遇到求救鈴響起，需要通報醫護時，應撥打119，並主動告知當天主管事情經過。", "answer": true, "explanation": "正確！需要通報醫護時，撥打119，同時也要主動告知當天主管完整的事情經過。"}, {"type": "single", "question": "求救鈴的正確使用時機是什麼？", "options": ["任何需要幫助的時候都可以按", "只有火災時才能按", "身體不適或意外發生等緊急情況", "廁所設備故障時"], "answer": 2, "explanation": "求救鈴僅供緊急使用，如身體不適、意外發生時才可按壓，不得隨意觸碰。"}, {"type": "multiple", "question": "B1求救鈴設置在哪些地點？（多選）", "options": ["無障礙廁所", "男廁", "客梯旁女廁", "辦公室"], "answer": [0, 1, 2], "explanation": "求救鈴設置在：無障礙廁所、男廁、客梯旁女廁（共2處），辦公室沒有設置求救鈴。"}, {"type": "single", "question": "服務鈴應對Step 3，到達現場後應該做什麼？", "options": ["立即撥打119", "拍照記錄", "簡單詢問當事人狀況，視情況通報醫護或保全", "等主管到場再處理"], "answer": 2, "explanation": "Step3是到達現場後，簡單詢問當事人狀況，再視情況決定是否通報醫護（119）或保全。"}, {"type": "truefalse", "question": "求救鈴只設置在廁所，其他地方沒有。", "answer": false, "explanation": "錯誤！雖然三處位置（無障礙廁所、男廁、客梯旁女廁）都在廁所區域，但共有4處求救鈴，且客梯旁女廁設有2處。"}, {"type": "fill", "question": "需要通報醫護時，應撥打緊急電話____。", "answer": "119", "explanation": "需要通報醫護時，請撥打119，並主動告知當天主管事情完整經過。"}, {"type": "single", "question": "求救鈴響起時，應該去哪裡解除警報？", "options": ["植境前台", "警報響起的廁所現場", "北市圖的桌子下方", "辦公室警報面板"], "answer": 2, "explanation": "警報解除裝置位置在北市圖（北市圖書館）的桌子下方，需前往該處操作解除警報。"}, {"type": "truefalse", "question": "求救鈴解除警報後，還需要主動前往事發位置確認當事人狀況。", "answer": true, "explanation": "正確！三個步驟缺一不可：Step1解除警報→Step2前往事發位置→Step3詢問狀況並視情況通報。"}, {"type": "single", "question": "以下哪種情況不適合按求救鈴？", "options": ["突然暈倒", "跌倒受傷", "廁所衛生紙用完", "身體嚴重不適"], "answer": 2, "explanation": "求救鈴僅供緊急使用，如身體不適或意外發生。廁所衛生紙用完是一般服務需求，不是緊急情況，不應按求救鈴。"}, {"type": "truefalse", "question": "B1客梯旁女廁共設有2處求救鈴，因此B1共有4處求救鈴。", "answer": true, "explanation": "正確！無障礙廁所1處＋男廁1處＋客梯旁女廁2處＝共4處求救鈴。"}, {"type": "single", "question": "發現有人按求救鈴後，到達現場若狀況嚴重，應撥打什麼電話？", "options": ["110", "119", "保全專線", "植境聯絡電話"], "answer": 1, "explanation": "需要通報醫護時，應撥打119，並主動告知當天主管事情完整經過。"}, {"type": "fill", "question": "求救鈴應對SOP共有____個步驟。", "answer": "3", "explanation": "三步驟：Step1迅速至服務台確認位置並解除警報→Step2立即前往事發位置→Step3詢問狀況視情況通報醫護或保全。"}]}, {"id": "level_19", "title": "情境挑戰", "emoji": "🧠", "teaching": {"sections": [{"heading": "什麼是情境挑戰？", "content": "這個關卡不考你背誦，而是考你「在真實狀況下，你會怎麼做？」\\n\\n每一題都是可能在植境實際發生的情境，沒有標準答案，但有思考框架。\\n\\n💡 遇到問題時的判斷順序：\\n1. 先確認人員安全（有沒有人受傷或危險？）\\n2. 保護顧客體驗（這會影響現場的客人嗎？）\\n3. 通報主管（超出自己能處理的範圍要盡快讓主管知道）\\n4. 按SOP處理（查懶人包或照標準流程）\\n5. 記錄（拍照、填表單、留下紀錄）"}]}, "questions": [{"type": "scenario", "question": "週六下午，你一個人值班，突然聽到女廁方向的求救鈴響。你衝到服務台解除警報後，發現當值主管正在接待重要客戶，一時無法離開。你會怎麼做？", "options": ["等主管接待完客戶再一起去確認", "自己先前往女廁確認狀況，同時傳訊息告知主管", "先廣播請其他同事支援，自己繼續守在服務台", "直接撥打119，請救護車到場"], "bestAnswer": 1, "thinking": "求救鈴是緊急情況，不能等。正確判斷順序：\\n\\n① 人員安全優先——先去確認當事人狀況，不能因為主管忙就延遲。\\n② 同步通報——前往的同時傳訊息告知主管，讓他掌握狀況。\\n③ 到現場再評估——抵達後才能判斷是否需要叫119，不應未確認就直接撥打。\\n\\n關鍵思維：緊急程度決定行動順序，溝通可以同步進行，不需要等到行動結束才報告。"}, {"type": "scenario", "question": "展演活動進行到一半，策展區突然完全沒有聲音輸出，麥克風和音樂都沒聲音。台上的主持人尷尬地看著你，台下有50位觀眾。你會？", "options": ["立刻上台跟觀眾道歉，宣布活動暫停等待修復", "先快速檢查最常見的原因（音量是否被調到靜音、設備是否斷電），同時示意主持人稍等", "馬上聯絡廠商，請他們遠端協助", "請主持人先用說話的方式繼續，等會再修"], "bestAnswer": 1, "thinking": "現場突發技術問題的處理邏輯：\\n\\n① 不要先宣布「壞了」——很多時候是小問題，先排查再說。\\n② 快速排查常見原因——靜音、電源、訊號線，通常30秒內能確認。\\n③ 讓現場「看起來有人處理」——示意主持人稍等，比讓台上乾等更能安撫觀眾。\\n④ 修不好才升級——排查後確實無法處理，再決定是暫停還是聯絡廠商。\\n\\n關鍵思維：鎮定、快速排查、同步安撫，是突發技術問題的三個核心。"}, {"type": "scenario", "question": "一位客人來詢問，說他上週租借場地時有一樣物品忘在會議室，問是否有失物招領。你查了一下，確實有同事撿到並放在服務台，但那個物品是一個較貴重的皮夾。你會怎麼確認這個物品是屬於這位客人的？", "options": ["直接把皮夾拿出來，問他「這是你的嗎？」", "請他先描述物品的外觀、顏色和內容物，再核對確認", "請他出示租借當天的訂單紀錄或身分證件", "請他等主管來處理，這種情況不在自己的職責範圍"], "bestAnswer": 1, "thinking": "失物招領的核對邏輯：\\n\\n① 不能直接出示物品——這樣等於讓對方「看了再說是自己的」，無法確認真實性。\\n② 讓對方先描述——請客人描述外觀、顏色、內容物（如卡片種類）再核對，這是標準的確認程序。\\n③ 文件核對是輔助——訂單紀錄可以輔助確認，但一般失物招領不需要強制要求。\\n\\n關鍵思維：程序的目的是保護物品的真正主人，也保護自己不做出錯誤的歸還決定。"}, {"type": "scenario", "question": "颱風警報發布確認停班停課，但已有一組客人早上9點就抵達，說他們從外縣市來不知道停班消息。館內只有你一個人，主管還在趕來的路上。你會？", "options": ["讓他們先進來等，反正都來了", "婉拒入場，請他們先在附近等候，主管到了再做決定", "立刻傳訊息請示主管，同時讓客人在門口稍候，解釋颱風停業情況", "直接叫他們回去，颱風天就是要停業"], "bestAnswer": 2, "thinking": "例外狀況的處理原則：\\n\\n① 不擅自做超出權限的決定——讓客人入場還是拒絕，這個決定超出單人值班的授權範圍，需要請示主管。\\n② 同步進行——傳訊息給主管的同時，先讓客人知道狀況，不要讓人乾等。\\n③ 態度溫暖但立場清楚——解釋是颱風停業而非不歡迎，讓客人感受到被重視。\\n④ 避免衝突——直接趕人是最差的選項，會造成不必要的糾紛。\\n\\n關鍵思維：緊急情況下，「請示 + 安撫 + 等待決策」比「自己決定」更安全。"}, {"type": "scenario", "question": "你更新官網後台的活動頁面，儲存後發現前台版面跑掉了，排版變得很亂。距離活動開始還有2小時。你會怎麼做？", "options": ["繼續嘗試修改，直到修好為止", "先截圖記錄現況，立刻告知主管，確認是否有備份或舊版本可以還原", "先把活動頁面設為隱藏，避免客人看到跑版的頁面", "聯絡網站廠商，請他們緊急處理"], "bestAnswer": 1, "thinking": "系統問題的緊急處理邏輯：\\n\\n① 先截圖——保留現況紀錄，這是任何問題處理的第一步。\\n② 告知主管——時間緊迫，讓主管知道並一起判斷處理方式。\\n③ 評估還原選項——後台通常有版本紀錄，還原比繼續修改更快速。\\n④ 聯絡廠商是選項之一——但需要主管授權，不應自行決定。\\n\\n關鍵思維：「記錄 → 通報 → 評估選項」，不要一個人悶著頭修到來不及。"}, {"type": "scenario", "question": "月底請款，你發現有一張3,000元收據，廠商是個人工作室，沒有統一編號。你應該？", "options": ["直接附上這張收據一起請款，金額不大", "請廠商改開有統一編號的發票再請款", "判斷這筆屬於個人勞務費，改用勞務請款單處理，請廠商簽名確認", "這筆費用無法請款，請主管決定是否自行吸收"], "bestAnswer": 2, "thinking": "請款類型的判斷邏輯：\\n\\n① 個人工作室 = 個人所得——沒有統一編號的個人提供的服務，屬於勞務費，不能用一般請款單。\\n② 勞務請款單是正確工具——用於支付個人所得，如講師費、工讀生薪資、個人翻譯費等。\\n③ 不能直接附上沒有統一編號的收據——這樣做會造成帳務問題，也不符合慈濟請款規定。\\n\\n關鍵思維：看到「個人、無統一編號、勞務性質」這幾個關鍵字，就要想到勞務請款單。"}, {"type": "scenario", "question": "你發現策展區有一盞射燈突然不亮，更換燈泡後還是沒有反應。你應該？", "options": ["繼續嘗試換不同的燈泡，直到找到問題", "拍照記錄，在通報表單填寫問題位置與狀況，告知主管，等候中澤工程處理", "直接打電話給中澤工程，請他們今天來修", "射燈不亮不影響營運，先記在心裡等有空再說"], "bestAnswer": 1, "thinking": "設備故障的標準處理流程：\\n\\n① 拍照——記錄現況，這是報修的必要步驟。\\n② 填通報表單——地點要具體（如「策展區東側第3排射燈」），說明已換燈泡仍無效。\\n③ 告知主管——讓主管掌握狀況，由主管決定是否要求加急。\\n④ 不自行聯絡廠商——聯絡中澤工程需要透過主管授權。\\n\\n關鍵思維：個人判斷「不影響營運就先等」是最常見的NG行為——每一個設備問題都應該留下紀錄。"}, {"type": "scenario", "question": "同事請你代班，但你這天原本已排假。你同意後，應該怎麼做才符合流程？", "options": ["口頭告知主管即可，系統之後再補", "請同事自己去系統取消她的班，你去系統新增你的班", "在系統提交排班變更申請，需於原排班前7個工作日完成，並取得部門主管同意", "這是兩個人之間的事，不需要走系統，主管知道就好"], "bestAnswer": 2, "thinking": "排班變更的合規邏輯：\\n\\n① 系統申請是必要的——口頭告知不算正式流程，萬一出問題（如薪資計算、出勤紀錄）會有糾紛。\\n② 時間要求——需在原排班前7個工作日完成申請，緊急代班請主管協助。\\n③ 主管同意是流程的一部分——是正式審核，不只是備案。\\n④ 不能各自亂改系統——需要通過正式的排班變更申請，確保紀錄一致。\\n\\n關鍵思維：HR系統的存在是為了保護員工，走流程不是麻煩，是保障。"}]}]';
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqJotAxyCtabaOnqnQZy7LZaEcLmpNpX_-t9zViUnedKBjgUa_BwLxaMgv0M9-K0L9/exec";
    const { useState, useEffect, useRef } = React;

    // ── Helpers ──────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleQ(q) {
      if ((q.type === "single" || q.type === "multiple") && q.options) {
        const indexed = q.options.map((opt, i) => ({ opt, i }));
        const sh = shuffle(indexed);
        const newOpts = sh.map(x => x.opt);
        const map = {};
        sh.forEach((x, ni) => { map[x.i] = ni; });
        let ans = q.type === "single" ? map[q.answer] : q.answer.map(a => map[a]).sort((a,b)=>a-b);
        return { ...q, options: newOpts, answer: ans };
      }
      return q;
    }

    function loadProgress(name) {
      try { return JSON.parse(localStorage.getItem("prog:" + name) || "{}"); }
      catch { return {}; }
    }
    function saveProgress(name, prog) {
      try { localStorage.setItem("prog:" + name, JSON.stringify(prog)); } catch {}
    }

    async function submitScore(user, dName, lid, ltitle, score, passed) {
      try {
        await fetch(APPS_SCRIPT_URL + "?action=submitScore&username=" + encodeURIComponent(user) +
          "&displayName=" + encodeURIComponent(dName) + "&levelId=" + encodeURIComponent(lid) +
          "&levelTitle=" + encodeURIComponent(ltitle) + "&score=" + score + "&passed=" + passed,
          { method:"GET", mode:"no-cors" });
      } catch {}
    }

    function jsonpLogin(user, pass) {
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Date.now();
        const s = document.createElement("script");
        window[cb] = (data) => { delete window[cb]; document.body.removeChild(s); resolve(data); };
        s.src = APPS_SCRIPT_URL + "?action=login&username=" + encodeURIComponent(user) +
          "&password=" + encodeURIComponent(pass) + "&callback=" + cb;
        s.onerror = () => { delete window[cb]; document.body.removeChild(s); reject(new Error("network")); };
        document.body.appendChild(s);
        setTimeout(() => { if(window[cb]){ delete window[cb]; try{document.body.removeChild(s);}catch{}; reject(new Error("timeout")); } }, 10000);
      });
    }

    // ── Design tokens ─────────────────────────────────────────────
    const C = {
      bg: "#0a1a0f", bgCard: "rgba(255,255,255,0.04)", surface: "rgba(255,255,255,0.06)",
      border: "rgba(255,255,255,0.1)", green: "#4caf50", greenLight: "#a5d6a7",
      greenDim: "rgba(76,175,80,0.15)", greenBorder: "rgba(76,175,80,0.3)",
      gold: "#ffd54f", text: "#e8f5e9", textMuted: "rgba(232,245,233,0.55)",
      textDim: "rgba(232,245,233,0.3)",
    };

    // ── Badges ───────────────────────────────────────────────────
    const BADGES = [
      { id:"first_pass", label:"初試啼聲", emoji:"🌱", desc:"通過第一關" },
      { id:"five_pass",  label:"節節高升", emoji:"🌿", desc:"通過5關" },
      { id:"ten_pass",   label:"學習達人", emoji:"🌳", desc:"通過10關" },
      { id:"all_pass",   label:"植境通",   emoji:"🏆", desc:"完成全部18關" },
      { id:"perfect",    label:"完美通關", emoji:"⭐", desc:"某關獲得100分" },
      { id:"comeback",   label:"越挫越勇", emoji:"💪", desc:"補考後通過" },
    ];
    function getBadges(progress) {
      const passed = Object.values(progress).filter(p => p && p.passed);
      const e = [];
      if (passed.length >= 1) e.push("first_pass");
      if (passed.length >= 5) e.push("five_pass");
      if (passed.length >= 10) e.push("ten_pass");
      if (passed.length >= 18) e.push("all_pass");
      if (Object.values(progress).some(p => p && p.bestScore === 100)) e.push("perfect");
      if (Object.values(progress).some(p => p && p.attempts > 1 && p.passed)) e.push("comeback");
      return e;
    }

    // ─────────────────────────────────────────────────────────────
    // SCREENS
    // ─────────────────────────────────────────────────────────────

    function LoginScreen({ onLogin }) {
      const [user, setUser] = useState("");
      const [pass, setPass] = useState("");
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");

      const handle = async () => {
        if (!user.trim() || !pass.trim()) { setErr("請輸入帳號和密碼"); return; }
        setLoading(true); setErr("");
        try {
          const data = await jsonpLogin(user.trim(), pass.trim());
          if (data && data.success) {
            const prog = loadProgress(user.trim());
            onLogin(user.trim(), data.displayName || user.trim(), prog);
          } else {
            setErr(data && data.message ? data.message : "帳號或密碼錯誤");
          }
        } catch {
          setErr("連線失敗，請確認網路後重試");
        }
        setLoading(false);
      };

      const inp = {
        width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)",
        borderRadius:"12px", padding:"14px 16px", color:C.text, fontSize:"15px", outline:"none",
      };

      return (
        <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:"24px" }}>
          <div style={{ width:"100%", maxWidth:"400px" }}>
            <div style={{ textAlign:"center", marginBottom:"40px" }}>
              <div style={{ fontSize:"56px", marginBottom:"16px" }}>🌿</div>
              <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:"28px", color:C.greenLight, marginBottom:"8px" }}>植境闖關系統</div>
              <div style={{ fontSize:"13px", color:C.textMuted }}>請輸入帳號密碼登入</div>
            </div>
            <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"20px", padding:"32px" }}>
              <div style={{ marginBottom:"16px" }}>
                <div style={{ fontSize:"12px", color:C.textMuted, marginBottom:"8px" }}>帳號</div>
                <input value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="輸入帳號" style={inp} />
              </div>
              <div style={{ marginBottom:"24px" }}>
                <div style={{ fontSize:"12px", color:C.textMuted, marginBottom:"8px" }}>密碼</div>
                <div style={{ position:"relative" }}>
                  <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} type={showPw?"text":"password"} placeholder="輸入密碼" style={{ ...inp, paddingRight:"48px" }} />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:"absolute", right:"14px", top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:"16px" }}>{showPw?"🙈":"👁"}</button>
                </div>
              </div>
              {err && <div style={{ background:"rgba(239,83,80,0.1)", border:"1px solid rgba(239,83,80,0.3)", borderRadius:"10px", padding:"10px 14px", fontSize:"13px", color:"#ef9a9a", marginBottom:"16px" }}>{err}</div>}

    function LevelMap({ levels, progress, displayName, onSelect, onDash, onLogout }) {
      const regular = levels.filter(l => l.id !== "level_19");
      const scenario = levels.find(l => l.id === "level_19");
      const passed = regular.filter(l => progress[l.id] && progress[l.id].passed).length;
      const pct = Math.round((passed / regular.length) * 100);

      const cardStyle = (l) => {
        const p = progress[l.id];
        const isPassed = p && p.passed;
        const isAttempted = p && p.attempts > 0;
        const isScenario = l.id === "level_19";
        return {
          background: isScenario ? (isAttempted ? "rgba(255,213,79,0.08)" : "rgba(255,213,79,0.03)")
            : isPassed ? "linear-gradient(135deg,rgba(76,175,80,0.18),rgba(56,142,60,0.1))"
            : isAttempted ? "rgba(255,152,0,0.07)" : C.bgCard,
          border: isScenario ? ("1px solid rgba(255,213,79," + (isAttempted?"0.35":"0.15") + ")")
            : isPassed ? "1px solid rgba(76,175,80,0.35)"
            : isAttempted ? "1px solid rgba(255,152,0,0.25)" : "1px solid rgba(255,255,255,0.1)",
          borderRadius:"18px", padding:"20px", cursor:"pointer", transition:"transform 0.15s",
        };
      };

      const LevelCard = ({ l }) => {
        const p = progress[l.id];
        const isPassed = p && p.passed;
        const isAttempted = p && p.attempts > 0;
        const isScenario = l.id === "level_19";
        const idx = levels.indexOf(l) + 1;
        const total = l.questions.length;
        const draw = total <= 8 ? 6 : total <= 12 ? 8 : 10;
        return (
          <div style={cardStyle(l)} onClick={() => onSelect(l)}>
            <div style={{ fontSize:"11px", color: isScenario ? C.gold : C.textDim, marginBottom:"6px", letterSpacing:"1px" }}>
              {isScenario ? "🎭 BONUS" : ("關卡 " + String(idx).padStart(2,"0"))}
            </div>
            <div style={{ fontSize:"24px", marginBottom:"8px" }}>{l.emoji}</div>
            <div style={{ fontSize:"13px", fontWeight:"600", color: isPassed ? C.greenLight : C.text, lineHeight:"1.4", marginBottom:"12px" }}>{l.title}</div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ fontSize:"11px", color:C.textDim }}>
                {isScenario ? "情境判斷・不計分" : ("共" + total + "題・考" + draw + "題")}
              </div>
              <div style={{ fontSize:"11px", fontWeight:"700", color: isPassed ? C.green : isAttempted ? "#ffb74d" : C.textDim }}>
                {isScenario ? (isAttempted ? "✓ 已挑戰" : "未開始")
                  : isPassed ? ("✓ " + p.bestScore + "分")
                  : isAttempted ? ("最高 " + p.bestScore + "分")
                  : "未開始"}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div style={{ minHeight:"100vh", background:C.bg, color:C.text }}>
          <div style={{ background:"rgba(0,0,0,0.35)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
              <span style={{ fontSize:"22px" }}>🌿</span>
              <div>
                <div style={{ fontSize:"15px", fontWeight:"700" }}>植境闖關系統</div>
                <div style={{ fontSize:"11px", color:C.textMuted }}>Hi, {displayName} 👋</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:"18px", fontWeight:"800", color:C.green }}>{pct}%</div>
                <div style={{ fontSize:"10px", color:C.textMuted }}>{passed}/18 關通過</div>
              </div>
              <button onClick={onDash} style={{ background:C.greenDim, border:"1px solid rgba(76,175,80,0.3)", color:C.greenLight, padding:"8px 14px", borderRadius:"10px", fontSize:"13px", cursor:"pointer" }}>📊 成績</button>
              <button onClick={onLogout} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, padding:"8px 14px", borderRadius:"10px", fontSize:"13px", cursor:"pointer" }}>登出</button>
            </div>
          </div>
          <div style={{ height:"3px", background:"rgba(255,255,255,0.05)" }}>
            <div style={{ height:"100%", width:(pct + "%"), background:"linear-gradient(90deg,#43a047,#66bb6a)", transition:"width 1s ease" }} />
          </div>
          <div style={{ padding:"20px 24px 40px", display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:"14px" }}>
            {regular.map(l => <LevelCard key={l.id} l={l} />)}
            {scenario && <LevelCard key={scenario.id} l={scenario} />}
          </div>
        </div>
      );
    }

            <button onClick={onBack} style={{ background:C.surface, border:"1px solid rgba(255,255,255,0.1)", color:C.textMuted, borderRadius:"10px", width:"36px", height:"36px", cursor:"pointer", fontSize:"16px" }}>←</button>

            <div style={{ background:"rgba(76,175,80,0.07)", border:"1px solid rgba(76,175,80,0.2)", borderLeft:"3px solid #4caf50", borderRadius:"12px", padding:"14px 16px", marginBottom:"20px" }}>

                const isWarn = line.startsWith("⚠️") || line.startsWith("📍") || line.startsWith("✅");
                const isStep = /^[①-⑨]/.test(line) || /^[1-9][.、]/.test(line);
