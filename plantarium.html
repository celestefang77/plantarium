                    cursor: "pointer", fontSize: "15px", fontFamily: "inherit",
                    lineHeight: "1.5", transition: "all 0.15s",
                    display: "flex", alignItems: "center", gap: "10px"
                  }}
                >
                  <span style={{
                    width: "20px", height: "20px", borderRadius: "4px",
                    border: selected ? "2px solid #81c784" : "2px solid rgba(255,255,255,0.2)",
                    background: selected ? "rgba(76,175,80,0.4)" : "transparent",
                    flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "12px"
                  }}>{selected ? "✓" : ""}</span>
                  {opt}
                </button>
              );
            })}
          </div>
        )}

        {(q.type === "truefalse") && (
          <div style={{ display: "flex", gap: "12px" }}>
            {[true, false].map(val => (
              <button
                key={String(val)}
                onClick={() => handleTF(val)}
                style={{
                  flex: 1, padding: "20px",
                  background: answers[current] === val ? (val ? "rgba(76,175,80,0.25)" : "rgba(244,67,54,0.2)") : "rgba(255,255,255,0.04)",
                  border: answers[current] === val ? (val ? "1px solid rgba(76,175,80,0.6)" : "1px solid rgba(244,67,54,0.5)") : "1px solid rgba(255,255,255,0.08)",
                  color: "#fff", borderRadius: "12px", cursor: "pointer",
                  fontSize: "18px", fontFamily: "inherit", fontWeight: "600", transition: "all 0.15s"
                }}
              >
                {val ? "⭕ 正確" : "❌ 錯誤"}
              </button>
            ))}
          </div>
        )}

        {(q.type === "fill") && (
          <div>
            <input
              value={fillText}
              onChange={e => setFillText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && canNext() && handleNext()}
              placeholder="請輸入答案..."
              style={{
                width: "100%", boxSizing: "border-box",
                padding: "16px 18px", background: "rgba(255,255,255,0.06)",
                border: "1px solid rgba(255,255,255,0.15)", borderRadius: "12px",
                color: "#fff", fontSize: "16px", outline: "none", fontFamily: "inherit"
              }}
            />
          </div>
        )}
      </div>

      {/* Combo display */}
      {showCombo && (
        <div style={{
          position: "fixed", top: "80px", left: "50%", transform: "translateX(-50%)",
          zIndex: 999, pointerEvents: "none"
        }}>
          <div className="combo-badge" style={{
            background: "linear-gradient(135deg, #ff9800, #ffd700)",
            color: "#000", fontWeight: "800", fontSize: "22px",
            padding: "10px 28px", borderRadius: "40px",
            boxShadow: "0 4px 24px rgba(255,215,0,0.5)",
            letterSpacing: "2px"
          }}>
            🔥 {combo} 連擊！
          </div>
        </div>
      )}

      {/* Answer feedback flash */}
      {lastCorrect !== null && (
        <div style={{
          position: "fixed", top: "50%", left: "50%",
          transform: "translate(-50%,-50%)",
          pointerEvents: "none", zIndex: 998, fontSize: "72px",
          animation: lastCorrect ? "popIn 0.4s ease forwards" : "shake 0.4s ease"
        }}>
          {lastCorrect ? "✅" : "❌"}
        </div>
      )}

      {/* Footer */}
      <div style={{
        padding: "16px 24px", borderTop: "1px solid rgba(255,255,255,0.08)",
        display: "flex", justifyContent: "flex-end", background: "rgba(0,0,0,0.2)"
      }}>
        <button
          onClick={handleNext}
          disabled={!canNext()}
          style={{
            background: canNext() ? "linear-gradient(135deg,#4caf50,#66bb6a)" : "rgba(255,255,255,0.08)",
            border: "none", color: canNext() ? "#fff" : "rgba(255,255,255,0.3)",
            padding: "12px 28px", borderRadius: "12px", fontSize: "15px",
            fontWeight: "600", cursor: canNext() ? "pointer" : "not-allowed",
            fontFamily: "inherit"
          }}
        >
          {current === totalQ - 1 ? "提交答案 ✓" : "下一題 →"}
        </button>
      </div>
    </div>
  );
}

function ResultScreen({ level, results, score, passed, onFinish }) {
  const correctCount = results.filter(r => r.isCorrect).length;

  return (
    <div style={{
      minHeight: "100vh", background: "#0f1f14",
      fontFamily: "'Noto Sans TC', sans-serif", color: "#fff",
      display: "flex", flexDirection: "column"
    }}>
      {/* Confetti for pass */}
      {passed && (() => { setTimeout(() => window.playSound("pass"), 300); return null; })()}
      {passed && (
        <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 999, overflow: "hidden" }}>
          {Array.from({length: 30}).map((_, i) => (
            <div key={i} style={{
              position: "absolute",
              left: Math.random() * 100 + "%",
              top: "-20px",
              width: (Math.random() * 10 + 6) + "px",
              height: (Math.random() * 10 + 6) + "px",
              background: ["#4caf50","#ffd700","#ff9800","#81c784","#fff","#a5d6a7"][Math.floor(Math.random()*6)],
              borderRadius: Math.random() > 0.5 ? "50%" : "2px",
              animation: `confettiFall ${Math.random()*2+1.5}s ${Math.random()*1.5}s ease-in forwards`,
              opacity: 0
            }} />
          ))}
        </div>
      )}

      {/* Score banner */}
      <div className={passed ? "pass-celebrate" : ""} style={{
        background: passed
          ? "linear-gradient(135deg, #1b5e20, #2e7d32)"
          : "linear-gradient(135deg, #e65100, #f57c00)",
        padding: "32px 24px", textAlign: "center"
      }}>
        <div style={{ fontSize: "48px", fontWeight: "800", marginBottom: "6px" }}>{score}</div>
        <div style={{ fontSize: "14px", opacity: 0.8, letterSpacing: "1px", marginBottom: "16px" }}>分</div>
        <div style={{
          display: "inline-block", padding: "8px 20px",
          background: passed ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.15)",
          borderRadius: "20px", fontSize: "15px", fontWeight: "600"
        }}>
          {passed ? "🎉 通過！" : `❌ 未通過（需達90分）`}
        </div>
        <div style={{ marginTop: "12px", fontSize: "13px", opacity: 0.7 }}>
          {correctCount} / {results.length} 題正確
        </div>
      </div>

      {/* Review */}
      <div style={{ flex: 1, padding: "24px", maxWidth: "720px", margin: "0 auto", width: "100%", boxSizing: "border-box", overflowY: "auto" }}>
        <h3 style={{ fontSize: "14px", letterSpacing: "1px", color: "rgba(255,255,255,0.5)", marginBottom: "16px" }}>答題回顧</h3>
        {results.map((r, i) => (
          <div key={i} style={{
            background: r.isCorrect ? "rgba(76,175,80,0.1)" : "rgba(244,67,54,0.08)",
            border: `1px solid ${r.isCorrect ? "rgba(76,175,80,0.3)" : "rgba(244,67,54,0.25)"}`,
            borderRadius: "12px", padding: "16px", marginBottom: "12px"
          }}>
            <div style={{ display: "flex", gap: "8px", marginBottom: "8px" }}>
              <span>{r.isCorrect ? "✅" : "❌"}</span>
              <span style={{ fontSize: "14px", fontWeight: "500", flex: 1, lineHeight: "1.5" }}>{r.question}</span>
            </div>
            {!r.isCorrect && (
              <div style={{
                background: "rgba(76,175,80,0.12)", borderRadius: "8px",
                padding: "10px 12px", marginTop: "8px"
              }}>
                <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)", marginBottom: "4px" }}>正確答案</div>
                <div style={{ fontSize: "13px", color: "#a5d6a7" }}>
                  {r.type === "truefalse" ? (r.answer ? "✔ 正確" : "✘ 錯誤")
                    : r.type === "single" ? r.options[r.answer]
                    : r.type === "multiple" ? r.answer.map(i => r.options[i]).join("、")
                    : r.answer}
                </div>
              </div>
            )}
            <div style={{
              background: "rgba(255,255,255,0.04)", borderRadius: "8px",
              padding: "10px 12px", marginTop: "8px", fontSize: "13px",
              color: "rgba(255,255,255,0.55)", lineHeight: "1.6"
            }}>
              💡 {r.explanation}
            </div>
          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{
        padding: "16px 24px", borderTop: "1px solid rgba(255,255,255,0.08)",
        display: "flex", gap: "10px", background: "rgba(0,0,0,0.2)"
      }}>
        <button
          onClick={() => onFinish(score, false)}
          style={{
            flex: 1, padding: "12px", background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.7)",
            borderRadius: "10px", cursor: "pointer", fontFamily: "inherit", fontSize: "14px"
          }}
        >← 返回地圖</button>
        {!passed && (
          <button
            onClick={() => onFinish(score, true)}
            style={{
              flex: 1, padding: "12px",
              background: "linear-gradient(135deg,#f57c00,#ff9800)",
              border: "none", color: "#fff", borderRadius: "10px",
              cursor: "pointer", fontFamily: "inherit", fontSize: "14px", fontWeight: "600"
            }}
          >🔄 補考</button>
        )}
      </div>
    </div>
  );
}

function DashboardScreen({ levels, progress, playerName, displayName, onClose }) {
  const badges = getBadges(progress);
  const passedCount = Object.values(progress).filter(p => p.passed).length;
  const totalAttempts = Object.values(progress).reduce((s, p) => s + (p.attempts || 0), 0);
  const avgScore = passedCount > 0
    ? Math.round(Object.values(progress).filter(p => p.passed).reduce((s, p) => s + (p.bestScore || 0), 0) / passedCount)
    : 0;

  return (
    <div style={{
      minHeight: "100vh", background: "#0f1f14",
      fontFamily: "'Noto Sans TC', sans-serif", color: "#fff"
    }}>
      <div style={{
        background: "linear-gradient(135deg,#0a2e1a,#1a4a2e)",
        padding: "16px 24px", display: "flex", alignItems: "center", gap: "16px",
        borderBottom: "1px solid rgba(255,255,255,0.08)"
      }}>
        <button onClick={onClose} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", fontSize: "20px", cursor: "pointer" }}>←</button>
        <div>
          <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.45)", letterSpacing: "1px" }}>學習儀表板</div>
          <div style={{ fontSize: "16px", fontWeight: "700" }}>{displayName} 的學習狀況</div>
        </div>
      </div>

      <div style={{ padding: "24px", maxWidth: "800px", margin: "0 auto" }}>
        {/* Stats */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "12px", marginBottom: "24px" }}>
          {[
            { label: "通過關卡", value: `${passedCount}/18`, emoji: "✅" },
            { label: "平均分數", value: avgScore ? `${avgScore}分` : "—", emoji: "📊" },
            { label: "總作答次數", value: totalAttempts, emoji: "📝" },
          ].map((s, i) => (
            <div key={i} style={{
              background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: "12px", padding: "16px", textAlign: "center"
            }}>
              <div style={{ fontSize: "24px", marginBottom: "4px" }}>{s.emoji}</div>
              <div style={{ fontSize: "22px", fontWeight: "700", color: "#a5d6a7" }}>{s.value}</div>
              <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)", marginTop: "2px" }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Badges */}
        <div style={{ marginBottom: "24px" }}>
          <h3 style={{ fontSize: "13px", color: "rgba(255,255,255,0.45)", letterSpacing: "1px", marginBottom: "12px" }}>成就徽章</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px,1fr))", gap: "8px" }}>
            {BADGES.map(b => {
              const earned = badges.includes(b.id);
              return (
                <div key={b.id} style={{
                  background: earned ? "rgba(76,175,80,0.15)" : "rgba(255,255,255,0.03)",
                  border: `1px solid ${earned ? "rgba(76,175,80,0.35)" : "rgba(255,255,255,0.06)"}`,
                  borderRadius: "10px", padding: "12px", textAlign: "center",
                  opacity: earned ? 1 : 0.4
                }}>
                  <div style={{ fontSize: "24px", marginBottom: "4px" }}>{b.emoji}</div>
                  <div style={{ fontSize: "12px", fontWeight: "600", color: earned ? "#a5d6a7" : "rgba(255,255,255,0.5)" }}>{b.label}</div>
                  <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.3)", marginTop: "2px" }}>{b.desc}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Level breakdown */}
        <div>
          <h3 style={{ fontSize: "13px", color: "rgba(255,255,255,0.45)", letterSpacing: "1px", marginBottom: "12px" }}>各關成績</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
            {levels.map((level, idx) => {
              const p = progress[level.id];
              const passed = p?.passed;
              const best = p?.bestScore;
              return (
                <div key={level.id} style={{
                  display: "flex", alignItems: "center", gap: "12px",
                  background: "rgba(255,255,255,0.03)", borderRadius: "8px", padding: "10px 14px"
                }}>
                  <span style={{ fontSize: "18px", width: "28px" }}>{level.emoji}</span>
                  <span style={{ flex: 1, fontSize: "13px", color: "rgba(255,255,255,0.7)" }}>
                    {String(idx + 1).padStart(2, "0")}. {level.title}
                  </span>
                  <span style={{
                    fontSize: "12px", fontWeight: "600",
                    color: passed ? "#81c784" : best ? "#ffb74d" : "rgba(255,255,255,0.25)"
                  }}>
                    {passed ? `✓ ${best}分` : best ? `${best}分` : "未作答"}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [LEVELS] = useState(() => JSON.parse(LEVELS_RAW));
  const [screen, setScreen] = useState("login"); // login | map | teaching | quiz | dashboard
  const [playerName, setPlayerName] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [progress, setProgress] = useState({});
  const [selectedLevel, setSelectedLevel] = useState(null);
  const [retake, setRetake] = useState(false);

  const handleLogin = (username, dName, savedProgress) => {
    setPlayerName(username);
    setDisplayName(dName);
    setProgress(savedProgress);
    setScreen("map");
  };

  const handleSelectLevel = (level) => {
    setSelectedLevel(level);
    setRetake(false);
    setScreen("teaching");
  };

  const handleStartQuiz = () => setScreen("quiz");

  const handleFinishQuiz = async (score, doRetake) => {
    const level = selectedLevel;
    const prev = progress[level.id] || {};
    const passed = score >= 90;
    const newProgress = {
      ...progress,
      [level.id]: {
        passed: passed || prev.passed || false,
        bestScore: Math.max(score, prev.bestScore || 0),
        attempts: (prev.attempts || 0) + 1,
        lastScore: score,
      }
    };
    setProgress(newProgress);
    await saveProgress(playerName, newProgress);
    await submitScore(playerName, displayName, level.id, level.title, score, passed, level.questions.length);

    if (doRetake) {
      setRetake(true);
      setScreen("teaching");
    } else {
      setScreen("map");
    }
  };

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      `}</style>

      {screen === "login" && <LoginScreen onLogin={handleLogin} />}
      {screen === "map" && (
        <LevelMap
          levels={LEVELS}
          progress={progress}
          playerName={playerName}
          displayName={displayName}
          onSelectLevel={handleSelectLevel}
          onOpenDashboard={() => setScreen("dashboard")}
          onLogout={() => { setPlayerName(""); setProgress({}); setScreen("login"); }}
        />
      )}
      {screen === "teaching" && selectedLevel && (
        <TeachingScreen
          level={selectedLevel}
          onStartQuiz={handleStartQuiz}
          onBack={() => setScreen("map")}
        />
      )}
      {screen === "quiz" && selectedLevel && (
        <QuizScreen
          key={`${selectedLevel.id}-${retake}`}
          level={selectedLevel}
          onFinish={handleFinishQuiz}
          onBack={() => setScreen("teaching")}
        />
      )}
      {screen === "dashboard" && (
        <DashboardScreen
          levels={LEVELS}
          progress={progress}
          playerName={playerName}
          displayName={displayName}
          onClose={() => setScreen("map")}
        />
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
